<style>
  :root{
    --pitch-dark:#0A1B3D;
    --pitch:#123063;
    --turf:#1B3E7A;
    --turf-light:#2F63B8;
    --chalk:#F5F3EA;
    --chalk-dim:#DDD8C8;
    --gold:#E8A33D;
    --gold-dim:#B9852F;
    --red:#C1443C;
    --ink:#0B241B;
    --line-white:rgba(245,243,234,0.14);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    font-family:'Inter',sans-serif;
    background:var(--pitch-dark);
    color:var(--chalk);
    overscroll-behavior:none;
  }
  #app{
    max-width:480px;
    margin:0 auto;
    min-height:100vh;
    background:
      radial-gradient(circle at 50% -10%, rgba(47,99,184,0.35), transparent 55%),
      repeating-linear-gradient(0deg, rgba(255,255,255,0.02) 0 60px, rgba(255,255,255,0.00) 60px 120px),
      var(--pitch-dark);
    display:flex;
    flex-direction:column;
    position:relative;
  }

  /* ---------- HEADER ---------- */
  header.top{
    padding:18px 18px 14px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    border-bottom:1px solid var(--line-white);
    position:sticky; top:0; z-index:20;
    background:rgba(15,61,46,0.92);
    backdrop-filter:blur(6px);
  }
  .brand{display:flex; align-items:center; gap:10px;}
  .crest{
    width:40px;height:40px;border-radius:50%;
    overflow:hidden;
    flex-shrink:0;
    border:2px solid var(--gold);
    box-shadow:0 0 0 3px rgba(232,163,61,0.15);
    background:var(--pitch);
  }
  .crest img{width:100%;height:100%;object-fit:cover; transform:scale(1.35);}
  .hero-crest{
    display:flex; flex-direction:column; align-items:center; text-align:center;
    padding:10px 0 22px;
  }
  .hero-crest img{
    width:112px; height:112px; object-fit:contain;
    filter:drop-shadow(0 8px 20px rgba(0,0,0,0.45));
    margin-bottom:10px;
  }
  .hero-crest .hc-title{font-family:'Oswald',sans-serif; font-size:20px; font-weight:700; letter-spacing:1px;}
  .hero-crest .hc-sub{font-size:10.5px; letter-spacing:2.5px; color:var(--gold); text-transform:uppercase; margin-top:3px;}
  .brand h1{
    font-family:'Oswald',sans-serif;
    font-size:18px; letter-spacing:0.5px; margin:0; font-weight:600;
  }
  .brand small{display:block; font-size:10.5px; color:var(--chalk-dim); letter-spacing:1.5px; text-transform:uppercase; margin-top:1px;}
  .sync-pill{
    font-size:10px; color:var(--chalk-dim); border:1px solid var(--line-white);
    padding:4px 8px; border-radius:20px; display:flex; align-items:center; gap:5px;
  }
  .sync-dot{width:6px;height:6px;border-radius:50%;background:var(--turf-light); box-shadow:0 0 6px var(--turf-light);}

  main{flex:1; padding:16px 16px 96px; overflow-y:auto;}
  .screen{display:none; animation:fadeIn .25s ease;}
  .screen.active{display:block;}
  @keyframes fadeIn{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);}}

  h2.section-title{
    font-family:'Oswald',sans-serif; font-size:13px; letter-spacing:1.5px; text-transform:uppercase;
    color:var(--gold); margin:22px 0 10px; display:flex; align-items:center; gap:8px;
  }
  h2.section-title:first-child{margin-top:0;}
  h2.section-title .num{
    font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--pitch-dark);
    background:var(--gold); width:18px;height:18px;border-radius:4px;
    display:flex;align-items:center;justify-content:center; flex-shrink:0;
  }

  /* ---------- CARDS ---------- */
  .card{
    background:linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
    border:1px solid var(--line-white);
    border-radius:14px;
    padding:14px 16px;
    margin-bottom:10px;
  }
  .stat-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:4px;}
  #duesSummaryGrid{grid-template-columns:repeat(3,1fr);}
  .stat-box{
    background:rgba(0,0,0,0.18); border:1px solid var(--line-white); border-radius:12px;
    padding:12px 8px; text-align:center;
  }
  .stat-box .n{font-family:'JetBrains Mono',monospace; font-size:22px; font-weight:700; color:var(--chalk);}
  .stat-box .l{font-size:10px; color:var(--chalk-dim); letter-spacing:0.5px; margin-top:2px;}

  .match-card{
    background:linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));
    border:1px solid var(--line-white); border-radius:14px; padding:0; margin-bottom:12px; overflow:hidden;
  }
  .match-head{
    padding:10px 14px; display:flex; justify-content:space-between; align-items:center;
    background:rgba(0,0,0,0.2); font-size:11px; color:var(--chalk-dim); letter-spacing:0.5px;
  }
  .match-status{
    font-size:9.5px; padding:2px 8px; border-radius:20px; letter-spacing:0.5px; font-weight:600;
  }
  .match-status.upcoming{background:rgba(47,99,184,0.25); color:#8FB8F0; border:1px solid rgba(143,184,240,0.3);}
  .match-status.live{background:rgba(70,180,110,0.2); color:#7FDDA0; border:1px solid rgba(127,221,160,0.35);}
  .match-status.done{background:rgba(232,163,61,0.18); color:var(--gold); border:1px solid rgba(232,163,61,0.3);}
  .match-body{padding:14px;}
  .match-vs{display:flex; align-items:center; justify-content:space-between; margin-bottom:10px;}
  .team-name{font-family:'Oswald',sans-serif; font-size:15px; font-weight:600;}
  .score{font-family:'JetBrains Mono',monospace; font-size:26px; font-weight:700; color:var(--gold); letter-spacing:2px;}
  .match-meta{font-size:11.5px; color:var(--chalk-dim); line-height:1.7;}
  .match-actions{display:flex; gap:8px; margin-top:12px;}

  /* ---------- BUTTONS ---------- */
  .btn{
    font-family:'Inter',sans-serif; font-weight:600; font-size:12.5px;
    border:none; border-radius:10px; padding:9px 14px; cursor:pointer;
    transition:transform .1s ease, opacity .15s ease;
  }
  .btn:active{transform:scale(0.96);}
  .btn-primary{background:var(--gold); color:var(--ink);}
  .btn-primary:hover{opacity:.92;}
  .btn-ghost{background:rgba(255,255,255,0.08); color:var(--chalk); border:1px solid var(--line-white);}
  .btn-danger{background:rgba(193,68,60,0.18); color:#FF9B92; border:1px solid rgba(255,155,146,0.3);}
  .btn-block{width:100%;}
  .btn-sm{padding:6px 10px; font-size:11px;}
  .fab{
    position:fixed; right:calc(50% - 240px + 18px); bottom:88px; z-index:30;
    width:52px; height:52px; border-radius:50%; background:var(--gold); color:var(--ink);
    display:flex; align-items:center; justify-content:center; font-size:26px; font-weight:700;
    border:none; box-shadow:0 6px 18px rgba(0,0,0,0.4); cursor:pointer;
  }
  @media (max-width:480px){ .fab{ right:18px; } }

  /* ---------- FORMS ---------- */
  label{display:block; font-size:11px; color:var(--chalk-dim); margin:10px 0 5px; letter-spacing:0.3px;}
  input, select, textarea{
    width:100%; background:rgba(0,0,0,0.25); border:1px solid var(--line-white); border-radius:9px;
    padding:10px 12px; color:var(--chalk); font-size:14px; font-family:'Inter',sans-serif;
  }
  input:focus, select:focus, textarea:focus{outline:none; border-color:var(--gold);}
  .row2{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  .chip-select{display:flex; gap:6px; flex-wrap:wrap; margin-top:4px;}

  /* ---------- MEMBER LIST ---------- */

  /* ---------- RSVP ---------- */

  /* ---------- EMPTY STATE ---------- */

    text-align:center; padding:40px 20px; color:var(--chalk-dim);

  .empty .ball{font-size:34px; margin-bottom:10px; opacity:.6;}

  /* ---------- MODAL ---------- */
  .overlay{
    position:fixed; inset:0; background:rgba(0,0,0,0.55); z-index:50; display:none;

  .overlay.active{display:flex;}
  .modal{
    background:var(--pitch-dark); border:1px solid var(--line-white); border-top-left-radius:20px; border-top-right-radius:20px;

    animation:slideUp .25s ease;

  @keyframes slideUp{from{transform:translateY(30px); opacity:0;} to{transform:translateY(0); opacity:1;}}
  .modal-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:6px;}
  .modal-head h3{font-family:'Oswald',sans-serif; font-size:17px; margin:0;}

    aspect-ratio:1; border-radius:9px; border:1px solid var(--line-white); background:rgba(0,0,0,0.2);

    font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--chalk-dim); gap:2px;

  .month-cell.unpaid{background:rgba(193,68,60,0.12); border-color:rgba(193,68,60,0.35); color:#FF9B92;}
  .month-cell .dotmark{width:6px;height:6px;border-radius:50%;}
  .month-cell.paid .dotmark{background:var(--turf-light);}
  .month-cell.unpaid .dotmark{background:var(--red);}
  .month-cell.future{opacity:0.35; cursor:default;}

  /* ---------- SETTLEMENT LEDGER ---------- */
  .ledger-row{
    display:grid; grid-template-columns:38px 1fr 1fr 1fr; gap:6px; align-items:center;
    padding:9px 4px; border-bottom:1px solid var(--line-white); font-size:12px;
  }
  .ledger-row:last-child{border-bottom:none;}
  .ledger-row.head{color:var(--chalk-dim); font-size:10px; letter-spacing:0.4px; padding-bottom:8px;}
  .ledger-mo{font-family:'Oswald',sans-serif; font-weight:600; color:var(--gold); font-size:13px;}
  .ledger-val{font-family:'JetBrains Mono',monospace; font-size:11.5px; text-align:right;}
  .ledger-val.pos{color:#8FB8F0;}
  .ledger-val.neg{color:#FF9B92;}
  .gear-btn{
    background:rgba(255,255,255,0.08); border:1px solid var(--line-white); color:var(--gold);
    width:32px;height:32px;border-radius:9px; font-size:14px; cursor:pointer; flex-shrink:0;
  }
  .settle-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:2px;}
  .detail-header{display:flex; align-items:center; gap:12px; margin-bottom:16px;}
  .detail-header .jersey{width:46px;height:46px;font-size:16px;}
  .detail-header .name{font-family:'Oswald',sans-serif; font-size:17px; font-weight:600;}
  .detail-header .sub{font-size:11.5px; color:var(--chalk-dim); margin-top:2px;}

  ::-webkit-scrollbar{width:0;}
</style>
</head>
<body>

<script>
/* ============================================================
   상태 / 저장소
   ============================================================ */
let MEMBERS = [];
let MATCHES = [];
let EXPENSES = [];
let SETTINGS = { monthlyDues: 30000, adminPin: '' };
let currentScreen = 'home';
let lbMode = 'apps';
let detailYear = new Date().getFullYear();
let duesSettleYear = new Date().getFullYear();

const POSITIONS = ['골레이','픽소','아라','피보'];
const ROLES = ['회원','회장','부회장','감독','코치','고문','주장','부주장','총무','회계'];
const REGIONS = ['서울','경기','인천','강원','충북','충남','대전','세종','전북','전남','광주','경북','경남','대구','부산','울산','제주','기타'];
const EXPENSE_CATEGORIES = ['경기장','식사','간식','용품구입','기타'];
const EXEC_ROLES = ['회장','고문','부회장','감독','코치','총무','회계'];
const COUNCIL_ROLES = ['회장','고문']; // 상호 승인으로만 취득 가능한 최고 의결권 역할
const PRACTICAL_EXEC_ROLES = ['부회장','감독','코치','총무','회계']; // 실무 집행부 - 겸직 가능, 지정/해제 시 PIN 확인

// 예전 단일 role 문자열 데이터를 roles 배열로 자동 변환 (하위호환, 1회성)
function migrateRoles(m){
  if(!Array.isArray(m.roles)){
    m.roles = (m.role && m.role !== '회원') ? [m.role] : [];
  }
}
function hasRole(m, r){ migrateRoles(m); return m.roles.includes(r); }
function roleLabel(m){
  migrateRoles(m);
  return m.roles.length ? m.roles.join(' · ') : '회원';
}
function hasAnyRole(m){ migrateRoles(m); return m.roles.length > 0; }
function addRole(m, r){ migrateRoles(m); if(!m.roles.includes(r)) m.roles.push(r); }
function removeRole(m, r){ migrateRoles(m); m.roles = m.roles.filter(x=>x!==r); }
function isChief(m){ return !!(m && hasRole(m,'회장')); }
function isAdvisor(m){ return !!(m && hasRole(m,'고문')); }
function advisorMembers(){ return activeRoster().filter(x=>hasRole(x,'고문')); }

function councilMembers(){
  return activeRoster().filter(m => { migrateRoles(m); return m.roles.some(r=>COUNCIL_ROLES.includes(r)); });
}
const MY_ID_KEY = 'gsfc_my_member_id';

function getMyMemberId(){
  try{ return localStorage.getItem(MY_ID_KEY) || null; }catch(e){ return null; }
}
function setMyMemberId(id){
  try{ if(id) localStorage.setItem(MY_ID_KEY, id); else localStorage.removeItem(MY_ID_KEY); }catch(e){}
}
function currentMember(){
  const id = getMyMemberId();
  return id ? memberById(id) : null;
}
function isExec(){
  const me = currentMember();
  if(!me || me.status==='pending') return false;
  migrateRoles(me);
  return me.roles.some(r=>EXEC_ROLES.includes(r));
}
function isSelf(memberId){
  const me = currentMember();
  return !!(me && me.id === memberId);
}
function updateWhoAmILabel(){
  const btn = document.getElementById('btnWhoAmI');
  if(!btn) return;
  const me = currentMember();
  btn.textContent = me ? (me.name.charAt(0)) : '👤';
  btn.title = me ? `${me.name}${isExec()?' · '+roleLabel(me):''} (본인 확인 변경)` : '본인 확인';
}
function openWhoAmIPicker(){
  const activeMembers = [...MEMBERS].sort((a,b)=>(a.number||999)-(b.number||999));
  const me = currentMember();
  const html = `
    <div class="modal-head"><h3>본인 확인</h3><button class="close-x" onclick="closeModal()">✕</button></div>
    <div class="match-meta" style="margin-bottom:10px; line-height:1.6;">
      본인이 누구인지 선택해두면, 이후 본인 정보 수정이나 본인 경기기록 입력이 가능해져요.<br>
      집행부(회장·부회장·감독·코치·총무·회계)로 선택하면 전체 데이터 입력 권한이 열려요.
    </div>
    <select id="f_whoami">
      <option value="">선택 안함</option>
      ${activeMembers.map(m=>`<option value="${m.id}" ${me&&me.id===m.id?'selected':''}>${escapeHTML(m.name)}${hasRole(m,'회장')||hasRole(m,'고문')||m.roles.some(r=>EXEC_ROLES.includes(r))?(m.status!=='pending'?' ('+roleLabel(m)+')':''):''}${m.status==='pending'?' (승인대기)':''}</option>`).join('')}
    </select>
    <div class="modal-foot">
      <button class="btn btn-ghost btn-block" onclick="closeModal()">취소</button>
      <button class="btn btn-primary btn-block" id="btnSaveWhoAmI">확인</button>
    </div>
  `;
  document.getElementById('modalBody').innerHTML = html;
  document.getElementById('overlay').classList.add('active');
  document.getElementById('btnSaveWhoAmI').addEventListener('click', ()=>{
    const val = document.getElementById('f_whoami').value;
    setMyMemberId(val || null);
    updateWhoAmILabel();
    closeModal();
    renderAll();
    showToast(val ? '본인 확인이 설정됐어요' : '본인 확인이 해제됐어요');
  });
}

/* ============================================================
   Supabase 저장소 연동 (window.storage 대체)
   ============================================================ */
const SUPABASE_URL = 'https://mwbldjggesjloaqalium.supabase.co';
const SUPABASE_KEY = 'sb_publishable_qLmu-mpQAeUCdMKoCSJsEw_oU7vB3ZP';

async function dbGet(key){
  const res = await fetch(
    `${SUPABASE_URL}/rest/v1/app_storage?key=eq.${encodeURIComponent(key)}&select=value`,
    { headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` } }
  );
  if(!res.ok){
    let detail = '';
    try{ detail = (await res.json()).message || ''; }catch(e){}
    throw new Error(`(${res.status}) ${detail || res.statusText}`);
  }
  const rows = await res.json();
  if(!rows.length || rows[0].value === null || rows[0].value === undefined) return null;
  return { key, value: JSON.stringify(rows[0].value) };
}

async function dbSet(key, valueStr){
  const parsed = JSON.parse(valueStr);
  const res = await fetch(`${SUPABASE_URL}/rest/v1/app_storage`, {
    method: 'POST',
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json',
      Prefer: 'resolution=merge-duplicates'
    },
    body: JSON.stringify([{ key, value: parsed, updated_at: new Date().toISOString() }])
  });
  if(!res.ok){
    let detail = '';
    try{ detail = (await res.json()).message || ''; }catch(e){}
    throw new Error(`(${res.status}) ${detail || res.statusText}`);
  }
  return { key, value: valueStr };
}

function sleep(ms){ return new Promise(r=>setTimeout(r, ms)); }

// 네트워크 순단 등 일시적 오류에 대비해 한 번 자동 재시도 후, 그래도 실패하면
// 화면에 실제 원인(상태코드/메시지)을 보여줘서 어디서 막혔는지 바로 알 수 있게 함
async function dbSetWithRetry(key, valueStr, label){
  const delays = [0, 800, 2000]; // 즉시 → 0.8초 후 → 2초 후, 총 3번 시도
  let lastErr = null;
  for(let i=0; i<delays.length; i++){
    if(delays[i]) await sleep(delays[i]);
    try{
      await dbSet(key, valueStr);
      return true;
    }catch(e){ lastErr = e; }
  }
  console.error('저장 실패:', label, lastErr);
  showToast(`저장 실패(${label}): ${lastErr.message} — 저장 안 됨, 다시 시도해주세요`.slice(0,90));
  return false;
}

    const html = `
      <div class="modal-head"><h3>관리자 확인</h3><button class="close-x" id="pinCancelX">✕</button></div>

    `;
    document.getElementById('modalBody').innerHTML = html;
    document.getElementById('overlay').classList.add('active');
    const finish = (result)=>{ closeModal(); resolve(result); };
    document.getElementById('pinCancelX').addEventListener('click', ()=>finish(false));

    const confirmBtn = document.getElementById('pinConfirmBtn');

  });
}

/* ============================================================
   연도 / 출석 / 회비 계산 헬퍼
   ============================================================ */
function availableYears(){
  const thisYear = new Date().getFullYear();
  const years = new Set([thisYear, thisYear+1]); // 선납 등록을 위해 다음 해도 항상 선택 가능하게
  MATCHES.forEach(m=>{ if(m.date) years.add(new Date(m.date).getFullYear()); });
  MEMBERS.forEach(mem=>{
    Object.keys(mem.dues||{}).forEach(key=>{
      const y = Number(key.split('-')[0]);
      if(y) years.add(y);
    });
  });
  return Array.from(years).sort((a,b)=>a-b);
}
function attendedIdsForMatch(m){
  const ids = new Set();
  const t = m.teams || {};
  Object.keys(t).forEach(k=> (t[k]||[]).forEach(id=>ids.add(id)));
  if(ids.size===0){
    Object.keys(m.rsvp||{}).forEach(id=>{ if(rsvpStatus(m,id)==='yes') ids.add(id); });
  }
  return ids;
}
function memberYearStats(memberId, year){
  const inYear = MATCHES.filter(m => m.date && new Date(m.date).getFullYear() === year);
  const total = inYear.length;
  const reserved = inYear.filter(m => (m.rsvp||{})[memberId] === 'yes').length;
  const attended = inYear.filter(m => m.status==='done' && attendedIdsForMatch(m).has(memberId)).length;
  return { total, reserved, attended };
}
function monthSettlement(year, month){
  const key = year + '-' + String(month).padStart(2,'0');
  const paidCount = activeRoster().filter(m => m.dues && m.dues[key]).length;
  const income = paidCount * (Number(SETTINGS.monthlyDues)||0);
  const matchExpense = MATCHES.filter(m=>{
    if(!m.date || !m.cost) return false;
    const d = new Date(m.date);
    return d.getFullYear()===year && (d.getMonth()+1)===month;
  }).reduce((sum,m)=> sum + (Number(m.cost)||0), 0);
  const monthExpenses = EXPENSES.filter(x=>{
    if(!x.date) return false;
    const d = new Date(x.date);
    return d.getFullYear()===year && (d.getMonth()+1)===month;
  });
  const categorizedExpense = monthExpenses.reduce((sum,x)=> sum + (Number(x.amount)||0), 0);
  const expense = matchExpense + categorizedExpense;
  const byCategory = {};
  EXPENSE_CATEGORIES.forEach(c=> byCategory[c] = 0);
  monthExpenses.forEach(x=>{ byCategory[x.category] = (byCategory[x.category]||0) + (Number(x.amount)||0); });
  if(matchExpense>0) byCategory['경기장'] = (byCategory['경기장']||0) + matchExpense;
  return { month, paidCount, income, expense, balance: income - expense, byCategory };
}

async function approveLeaderRequest(m){
  const me = currentMember();
  if(!me){ showToast('본인 확인(👤)을 먼저 해주세요'); return; }
  const req = m.pendingLeaderRequest;
  if(!req){ return; }
  if(!req.requiredApproverIds.includes(me.id)){ showToast('이 신청의 승인 권한이 없어요'); return; }
  if(req.approvedBy.includes(me.id)){ showToast('이미 승인하셨어요'); return; }
  const prevApprovedBy = [...req.approvedBy];
  const prevReq = { ...req, approvedBy: prevApprovedBy };
  const prevRoles = [...(m.roles||[])];
  req.approvedBy.push(me.id);
  if(req.approvedBy.length >= req.requiredApproverIds.length){
    addRole(m, req.targetRole);
    delete m.pendingLeaderRequest;
    const ok = await saveMembers();
    if(!ok){ m.roles = prevRoles; m.pendingLeaderRequest = prevReq; renderAll(); return; }
    renderAll();
    showToast(`${m.name}님이 ${req.targetRole}(으)로 승인·지정되었습니다`);
  }else{
    const ok = await saveMembers();
    if(!ok){ m.pendingLeaderRequest = prevReq; renderAll(); return; }
    renderAll();
    showToast(`승인했어요 (${req.approvedBy.length}/${req.requiredApproverIds.length})`);
  }
}

  if(!me){ showToast('본인 확인(👤)을 먼저 해주세요'); return false; }
  if(m.pendingPracticalRoleRequest){ showToast('이미 진행 중인 실무 직책 변경 요청이 있어요'); return false; }
  if(!rolesToAdd.length && !rolesToRemove.length) return true;

  if(isChief(me)){
    // 회장은 독자적으로 즉시 적용
    const prevRoles = [...m.roles];
    applyRoleDiff(m, rolesToAdd, rolesToRemove);
    const ok = await saveMembers();
    if(!ok){ m.roles = prevRoles; renderAll(); return false; }
    renderAll();
    showToast('실무 직책을 변경했습니다');
    return true;
  }

  if(isAdvisor(me)){
    const others = advisorMembers().filter(a=>a.id!==me.id);
    if(others.length===0){
      // 고문이 본인 1명뿐이면 전원 동의가 곧 본인 동의이므로 즉시 적용
      const prevRoles = [...m.roles];
      applyRoleDiff(m, rolesToAdd, rolesToRemove);
      const ok = await saveMembers();
      if(!ok){ m.roles = prevRoles; renderAll(); return false; }
      renderAll();
      showToast('실무 직책을 변경했습니다');
      return true;
    }
    const prevReq = m.pendingPracticalRoleRequest;
    m.pendingPracticalRoleRequest = {
      rolesToAdd, rolesToRemove,
      requiredApproverIds: others.map(o=>o.id),
      approvedBy: [],
      proposedBy: me.id,
      appliedAt: new Date().toISOString()
    };
    const ok = await saveMembers();
    if(!ok){ m.pendingPracticalRoleRequest = prevReq; renderAll(); return false; }
    renderAll();
    showToast(`실무 직책 변경을 제안했어요. 다른 고문 전원 동의가 필요해요 (0/${others.length})`);
    return true;
  }

  showToast('실무 직책 임명·해임은 회장 또는 고문만 할 수 있어요');
  return false;
}

async function approvePracticalRoleRequest(m){
  const me = currentMember();
  if(!me){ showToast('본인 확인(👤)을 먼저 해주세요'); return; }
  const req = m.pendingPracticalRoleRequest;
  if(!req) return;
  if(!req.requiredApproverIds.includes(me.id)){ showToast('이 요청의 승인 권한이 없어요'); return; }
  if(req.approvedBy.includes(me.id)){ showToast('이미 동의하셨어요'); return; }
  const prevApprovedBy = [...req.approvedBy];
  const prevReq = { ...req, approvedBy: prevApprovedBy };
  const prevRoles = [...m.roles];
  req.approvedBy.push(me.id);
  if(req.approvedBy.length >= req.requiredApproverIds.length){
    applyRoleDiff(m, req.rolesToAdd, req.rolesToRemove);
    delete m.pendingPracticalRoleRequest;
    const ok = await saveMembers();
    if(!ok){ m.roles = prevRoles; m.pendingPracticalRoleRequest = prevReq; renderAll(); return; }
    renderAll();
    showToast(`${m.name}님의 실무 직책이 변경되었습니다`);
  }else{
    const ok = await saveMembers();
    if(!ok){ m.pendingPracticalRoleRequest = prevReq; renderAll(); return; }
    renderAll();
    showToast(`동의했어요 (${req.approvedBy.length}/${req.requiredApproverIds.length})`);
  }
}

async function cancelPracticalRoleRequest(m){
  const me = currentMember();
  const req = m.pendingPracticalRoleRequest;
  if(!req) return;
  if(!(me && (req.proposedBy===me.id || isChief(me)))){ showToast('제안자 또는 회장만 취소할 수 있어요'); return; }
  const prevReq = req;
  delete m.pendingPracticalRoleRequest;
  const ok = await saveMembers();
  if(!ok){ m.pendingPracticalRoleRequest = prevReq; renderAll(); return; }
  renderAll();
  showToast('실무 직책 변경 제안을 취소했어요');
}

function rsvpStatus(m, mid){
  const r = m.rsvp ? m.rsvp[mid] : null;
  if(!r) return 'maybe';
  return typeof r === 'string' ? r : r.value;
}
function rsvpAt(m, mid){
  const r = m.rsvp ? m.rsvp[mid] : null;
  if(!r || typeof r === 'string') return null;
  return r.at || null;
}
function setRsvp(m, mid, value){
  m.rsvp = m.rsvp || {};
  m.rsvp[mid] = { value, at: new Date().toISOString() };
}
function fridayCutoff(dateStr){
  const matchDate = new Date(dateStr + 'T18:00:00');
  const dow = matchDate.getDay(); // 0=Sun..6=Sat, Fri=5
  const daysBack = (dow - 5 + 7) % 7;
  const cutoff = new Date(matchDate);
  cutoff.setDate(matchDate.getDate() - daysBack);
  cutoff.setHours(18,0,0,0);
  return cutoff;
}

    const canApprove = me && req.requiredApproverIds.includes(me.id) && !req.approvedBy.includes(me.id);
    return `
      <div class="card" style="padding:12px 14px; margin-top:10px; border-color:#C1443C;">
        <div style="font-size:12.5px; margin-bottom:8px; color:#FF9B92;">
          ⚠️ ${req.targetRole} 해임 절차 진행 중 · 동의 ${req.approvedBy.length}/${req.requiredApproverIds.length}
        </div>
        <div style="display:flex; gap:8px;">
          ${canApprove ? `<button class="btn btn-danger btn-sm" style="flex:1;" id="btnApproveRemoval">동의</button>` : ''}
          <button class="btn btn-ghost btn-sm" style="flex:1;" id="btnCancelRemoval">절차 취소</button>
        </div>
      </div>`;
  }
  if(!heldCouncilRoles.length) return '';
  return `
    <div class="card" style="padding:12px 14px; margin-top:10px;">
      <div style="font-size:11.5px; color:var(--chalk-dim); margin-bottom:8px;">
        현재 직책: <b style="color:var(--gold);">${heldCouncilRoles.join(' · ')}</b> — 해임하려면 본인 외 회장·고문 전원의 동의가 필요해요.
      </div>
      <div style="display:flex; gap:8px;">
        ${heldCouncilRoles.map(r=>`<button class="btn btn-danger btn-sm" style="flex:1;" data-propose-removal="${r}">${r} 해임 시작</button>`).join('')}
      </div>
    </div>`;
}

function renderPracticalRoleRequestSection(m){
  const req = m.pendingPracticalRoleRequest;
  if(!req) return '';
  const me = currentMember();
  const canApprove = me && req.requiredApproverIds.includes(me.id) && !req.approvedBy.includes(me.id);
  const diffLabel = [
    req.rolesToAdd.length ? `+${req.rolesToAdd.join('·')}` : '',
    req.rolesToRemove.length ? `-${req.rolesToRemove.join('·')}` : ''
  ].filter(Boolean).join(' ');
  return `
    <div class="card" style="padding:12px 14px; margin-top:10px; border-color:var(--gold);">
      <div style="font-size:12.5px; margin-bottom:8px;">
        ⏳ 실무 직책 변경 제안 (${escapeHTML(diffLabel)}) · 고문 동의 ${req.approvedBy.length}/${req.requiredApproverIds.length}
      </div>
      <div style="display:flex; gap:8px;">
        ${canApprove ? `<button class="btn btn-primary btn-sm" style="flex:1;" id="btnApprovePracticalRole">동의</button>` : ''}
        <button class="btn btn-ghost btn-sm" style="flex:1;" id="btnCancelPracticalRole">제안 취소</button>
      </div>
    </div>`;
}

function bindLeaderRequestButtons(m){
  if(!m) return;
  document.querySelectorAll('[data-apply-council]').forEach(btn=>{
    btn.addEventListener('click', ()=> applyForLeaderRole(m, btn.dataset.applyCouncil));
  });
  const cancelBtn = document.getElementById('btnCancelLeaderReq');
  if(cancelBtn) cancelBtn.addEventListener('click', ()=> cancelLeaderRequest(m));

  document.querySelectorAll('[data-propose-removal]').forEach(btn=>{
    btn.addEventListener('click', ()=> proposeRemoval(m, btn.dataset.proposeRemoval));
  });
  const approveRemovalBtn = document.getElementById('btnApproveRemoval');
  const cancelRemovalBtn = document.getElementById('btnCancelRemoval');
  if(approveRemovalBtn) approveRemovalBtn.addEventListener('click', ()=> approveRemoval(m));
  if(cancelRemovalBtn) cancelRemovalBtn.addEventListener('click', ()=> cancelRemoval(m));

  const approvePrBtn = document.getElementById('btnApprovePracticalRole');
  const cancelPrBtn = document.getElementById('btnCancelPracticalRole');
  if(approvePrBtn) approvePrBtn.addEventListener('click', ()=> approvePracticalRoleRequest(m));
  if(cancelPrBtn) cancelPrBtn.addEventListener('click', ()=> cancelPracticalRoleRequest(m));
}

      closeModal();
      renderAll();
      showToast('회원을 삭제했습니다');
    });
  }
}

function renderMatches(){
  const upcoming = MATCHES.filter(m=>m.status==='upcoming').sort((a,b)=> new Date(a.date+'T'+(a.time||'00:00')) - new Date(b.date+'T'+(b.time||'00:00')));
  const past = MATCHES.filter(m=>m.status==='done').sort((a,b)=> new Date(b.date)-new Date(a.date));

  const upBox = document.getElementById('upcomingMatches');
  upBox.innerHTML = upcoming.length ? upcoming.map(m=>matchCardHTML(m,true)).join('') : `<div class="empty" style="padding:24px 12px;"><p>예정된 경기가 없습니다.</p></div>`;
  bindMatchCardEvents(upBox);

  const pastBox = document.getElementById('pastMatches');
  pastBox.innerHTML = past.length ? past.map(m=>matchCardHTML(m,true)).join('') : `<div class="empty" style="padding:24px 12px;"><p>지난 경기 기록이 없습니다.</p></div>`;
  bindMatchCardEvents(pastBox);
}

const TEAM_COLOR_LABEL = { orange:'🟠 주황', yellow:'🟡 노랑', black:'⚫ 검정' };

function internalTeamTotals(m){
  const totals = { orange:{goals:0,wins:0,draws:0,losses:0}, yellow:{goals:0,wins:0,draws:0,losses:0}, black:{goals:0,wins:0,draws:0,losses:0} };
  (m.quarters||[]).forEach(q=>{
    if(!q.side1 || !q.side2) return;
    const s1 = Number(q.score1)||0, s2 = Number(q.score2)||0;
    if(totals[q.side1]) totals[q.side1].goals += s1;
    if(totals[q.side2]) totals[q.side2].goals += s2;
    if(s1>s2){ if(totals[q.side1]) totals[q.side1].wins++; if(totals[q.side2]) totals[q.side2].losses++; }
    else if(s2>s1){ if(totals[q.side2]) totals[q.side2].wins++; if(totals[q.side1]) totals[q.side1].losses++; }
    else { if(totals[q.side1]) totals[q.side1].draws++; if(totals[q.side2]) totals[q.side2].draws++; }
  });
  return totals;
}
function externalTotals(m){
  let scoreA = 0, scoreB = 0;
  (m.quarters||[]).forEach(q=>{ scoreA += Number(q.score1)||0; scoreB += Number(q.score2)||0; });
  return { scoreA, scoreB };
}

function matchCardHTML(m, showActions){
  const dateObj = new Date(m.date + 'T' + (m.time||'00:00'));
  const dateStr = dateObj.toLocaleDateString('ko-KR', { month:'short', day:'numeric', weekday:'short' });
  const timeStr = m.time || '';
  const rsvpCounts = countRSVP(m);
  const isDone = m.status==='done';
  const isLive = m.status==='live';
  const isInternal = m.matchType === 'internal';

  let vsHTML;
  if(isInternal){
    if(isDone){
      const totals = internalTeamTotals(m);
      vsHTML = `<div style="display:flex; justify-content:space-around; width:100%; font-size:12.5px;">
        ${Object.keys(TEAM_COLOR_LABEL).map(c=>`<span>${TEAM_COLOR_LABEL[c]} <b style="color:var(--gold);">${totals[c].wins}승${totals[c].draws?totals[c].draws+'무':''}${totals[c].losses}패</b></span>`).join('')}
      </div>`;
    }else{
      vsHTML = `<span class="team-name">자체경기 (주황 · 노랑 · 검정)</span>`;
    }
  }else{
    vsHTML = `
        <span class="team-name">공사랑FC</span>
        ${isDone
          ? (()=>{ const t = externalTotals(m); return `<span class="score">${t.scoreA} : ${t.scoreB}</span>`; })()
          : `<span class="team-name" style="color:var(--chalk-dim);">VS</span>`}
        <span class="team-name">${escapeHTML(m.opponent||'상대팀 미정')}</span>`;
  }

  const statusLabel = isDone ? '종료' : (isLive ? '진행중' : '예정');
  const statusClass = isDone ? 'done' : (isLive ? 'live' : 'upcoming');

  let actionsHTML = '';
  if(showActions){
    if(!isLive && !isDone){
      actionsHTML = `<button class="btn btn-ghost btn-sm" data-act="rsvp">참석 체크</button>
                     <button class="btn btn-ghost btn-sm" data-act="teams">팀 편성</button>
                     <button class="btn btn-primary btn-sm" data-act="start">경기 시작</button>`;
    }else if(isLive){
      actionsHTML = `<button class="btn btn-ghost btn-sm" data-act="rsvp">참석 체크</button>
                     <button class="btn btn-ghost btn-sm" data-act="teams">팀 편성</button>
                     <button class="btn btn-primary btn-sm" data-act="record">기록 입력</button>`;
    }else{
      actionsHTML = isExec() ? `<button class="btn btn-ghost btn-sm" data-act="editresult">결과 수정</button>` : '';
    }

  return `
  <div class="match-card" data-id="${m.id}">
    <div class="match-head">
      <span>${dateStr} ${timeStr}</span>
      <span class="match-status ${statusClass}">${statusLabel}</span>

    <div class="match-body">
      <div class="match-vs">
        ${vsHTML}
      </div>
      <div class="match-meta">

        ${!isDone ? `✅ 참석 ${rsvpCounts.yes} · ❔ 미정 ${rsvpCounts.maybe} · ❌ 불참 ${rsvpCounts.no}` : (m.result?.mom ? `🏅 MOM: ${escapeHTML(memberName(m.result.mom))}` : '')}
        ${isDone && m.quarters && m.quarters.length ? ` · ⏱ ${m.quarters.length}쿼터 진행` : ''}
      </div>
      ${showActions ? `<div class="match-actions">${actionsHTML}</div>` : ''}
    </div>
  </div>`;
}

function countRSVP(m){
  const c = {yes:0, no:0, maybe:0};
  activeRoster().forEach(mem=>{
    const v = rsvpStatus(m, mem.id);
    if(v==='yes') c.yes++; else if(v==='no') c.no++; else c.maybe++;
  });
  return c;
}
function memberName(id){ const m = memberById(id); return m ? m.name : '알 수 없음'; }

function bindMatchCardEvents(container){
  container.querySelectorAll('.match-card').forEach(card=>{
    const id = card.dataset.id;
    card.querySelectorAll('[data-act]').forEach(btn=>{
      btn.addEventListener('click', async (e)=>{
        e.stopPropagation();
        const act = btn.dataset.act;
        const m = MATCHES.find(x=>x.id===id);
        if(act==='rsvp') openRSVPForm(m);
        if(act==='teams'){
          if(!isExec()){ showToast('팀 편성은 집행부만 할 수 있어요'); return; }
          openTeamForm(m);
        }
        if(act==='start'){
          if(!isExec()){ showToast('경기 시작은 집행부만 할 수 있어요'); return; }
          const result = await saveMatchPatch(m.id, (freshM)=>{ freshM.status = 'live'; });
          if(!result.ok){ showToast('저장에 실패했어요. 다시 시도해주세요'); return; }
          renderAll();
          showToast('경기를 시작했어요. 이제 쿼터를 등록하고 기록을 입력할 수 있어요');
        }
        if(act==='record' || act==='editresult') openResultForm(m);
        if(act==='delete') deleteMatch(m);
      });
    });
  });
}

async function deleteMatch(m){
  if(!isExec()){ showToast('경기 삭제는 집행부만 할 수 있어요'); return; }
  if(!confirm('이 경기를 삭제할까요?')) return;
  const ok = await requireAdminPin('경기 삭제');
  if(!ok) return;
  const prevMatches = MATCHES;
  MATCHES = MATCHES.filter(x=>x.id!==m.id);
  const saved = await saveMatches();
  if(!saved){ MATCHES = prevMatches; renderAll(); return; }
  renderAll();
  showToast('경기를 삭제했습니다');
}

function nextSaturdayISO(){
  const d = new Date();
  const daysAhead = (6 - d.getDay() + 7) % 7 || 7; // 오늘이 토요일이면 다음주 토요일
  d.setDate(d.getDate() + daysAhead);
  return d.toISOString().slice(0,10);
}

function renderRSVPList(m){
  const box = document.getElementById('rsvpList');
  const roster = activeRoster();
  if(roster.length===0){ box.innerHTML = `<div class="empty"><p>등록된(승인된) 회원이 없습니다.</p></div>`; return; }
  const sorted = [...roster].sort((a,b)=>(a.number||999)-(b.number||999));
  box.innerHTML = sorted.map(mem=>{
    const v = rsvpStatus(m, mem.id);
    const editable = isExec() || isSelf(mem.id);
    return `
    <div class="member-row">
      <div class="jersey">${mem.number ?? '-'}</div>
      <div class="member-info"><div class="name">${escapeHTML(mem.name)}</div></div>
      <div class="rsvp-btns" data-mid="${mem.id}" data-editable="${editable}">
        <button class="rsvp-btn yes ${v==='yes'?'active':''}" data-v="yes" ${editable?'':'disabled style="opacity:.35;"'}>✓</button>
        <button class="rsvp-btn maybe ${v==='maybe'?'active':''}" data-v="maybe" ${editable?'':'disabled style="opacity:.35;"'}>?</button>
        <button class="rsvp-btn no ${v==='no'?'active':''}" data-v="no" ${editable?'':'disabled style="opacity:.35;"'}>✕</button>
      </div>
    </div>`;
  }).join('');

  box.querySelectorAll('.rsvp-btns[data-editable="true"]').forEach(group=>{
    group.querySelectorAll('.rsvp-btn').forEach(btn=>{
      btn.addEventListener('click', async ()=>{
        const mid = group.dataset.mid;
        const prevValue = rsvpStatus(m, mid);
        const prevAt = rsvpAt(m, mid);
        group.querySelectorAll('.rsvp-btn').forEach(b=>b.disabled = true);
        setRsvp(m, mid, btn.dataset.v);
        const ok = await saveMatches();
        group.querySelectorAll('.rsvp-btn').forEach(b=>b.disabled = false);
        if(ok){
          group.querySelectorAll('.rsvp-btn').forEach(b=>b.classList.remove('active'));
          btn.classList.add('active');
        }else{
          // 저장 실패 시 화면에는 표시하지 않고 이전 값으로 되돌려서, 실제 저장 안 된 상태를 잘못 보여주지 않게 함
          m.rsvp[mid] = prevAt ? { value: prevValue, at: prevAt } : prevValue;
        }
      });
    });
  });
}

  if(!m.quarters) m.quarters = [];

  const pool = attending.length ? attending : roster;
  const full = isExec();
  const me = currentMember();
  const isDoneStatus = m.status === 'done';
  const sideKeys = matchSideKeys(m);

  const html = `

          freshM.quarters[i].score1 = edit.score1;

function openQuarterTeamForm(m, qi, pool, colors){
  const q = m.quarters[qi];
  if(!q) return;
  let teams = q.teams ? JSON.parse(JSON.stringify(q.teams)) : JSON.parse(JSON.stringify(m.teams || {}));
  colors.forEach(c=>{ if(!teams[c]) teams[c] = []; });
  const shortLabel = { orange:'주황', yellow:'노랑', black:'검정', A:'A팀', B:'B팀' };

  const html = `
    <div class="modal-head"><h3>쿼터 ${qi+1} 팀 조정</h3><button class="close-x" onclick="closeModal()">✕</button></div>
    <div class="match-meta" style="margin-bottom:10px;">이 쿼터에서만 적용돼요. 기본 팀 편성과 다르게 할 때만 조정하세요.</div>
    <div id="qTeamColumns" style="display:grid; gap:8px; grid-template-columns:${colors.map(()=>'1fr').join(' ')};"></div>

      <button class="btn btn-primary btn-block" id="btnSaveQTeam">저장</button>
    </div>
  `;
  document.getElementById('modalBody').innerHTML = html;
  document.getElementById('overlay').classList.add('active');

  function render(){
    document.getElementById('qTeamColumns').innerHTML = colors.map(c=>`
      <div><label style="font-size:11.5px;">${shortLabel[c]||c} (<span id="qCount_${c}">${teams[c].length}</span>)</label>
      <div class="card" id="qList_${c}" style="padding:5px 6px; min-height:120px;"></div></div>
    `).join('');
    const assigned = new Set(colors.flatMap(c=>teams[c]));
    const unassigned = pool.filter(mem=>!assigned.has(mem.id));
    const rowHTML = (mem, zone) => `
      <div class="member-row" data-id="${mem.id}" style="padding:5px 3px; flex-wrap:wrap;">
        <div class="jersey" style="width:24px;height:24px;font-size:10px;">${mem.number ?? '-'}</div>
        <div class="member-info"><div class="name" style="font-size:12px;">${escapeHTML(mem.name)}</div></div>
        <div style="display:flex; gap:3px; flex-wrap:wrap;">
          ${colors.filter(c=>c!==zone).map(c=>`<button class="btn btn-ghost btn-sm" style="padding:4px 6px; font-size:10px;" data-to="${c}">${shortLabel[c]||c}</button>`).join('')}
          ${zone!=='pool'?`<button class="btn btn-ghost btn-sm" style="padding:4px 6px; font-size:10px;" data-to="pool">-</button>`:''}
        </div>
      </div>`;
    colors.forEach(c=>{
      document.getElementById('qList_'+c).innerHTML = teams[c].length ? teams[c].map(id=>rowHTML(memberById(id), c)).join('') : `<div style="font-size:10.5px;color:var(--chalk-dim);padding:6px;">비어있음</div>`;
      document.getElementById('qCount_'+c).textContent = teams[c].length;

    document.getElementById('qTeamPool').innerHTML = unassigned.length ? unassigned.map(mem=>rowHTML(mem,'pool')).join('') : `<div style="font-size:11px;color:var(--chalk-dim);padding:8px;">모두 배정됨</div>`;

    document.querySelectorAll('#qTeamColumns [data-to], #qTeamPool [data-to]').forEach(btn=>{
      btn.addEventListener('click', (e)=>{
        const row = e.target.closest('.member-row');
        const id = row.dataset.id;
        colors.forEach(c=>{ teams[c] = teams[c].filter(x=>x!==id); });
        if(btn.dataset.to !== 'pool') teams[btn.dataset.to].push(id);
        render();
      });
    });
  }
  render();

  const resetBtn = document.getElementById('btnResetQTeam');
  if(resetBtn) resetBtn.addEventListener('click', async ()=>{
    const result = await saveMatchPatch(m.id, (freshM)=>{ if(freshM.quarters[qi]) delete freshM.quarters[qi].teams; });
    if(!result.ok){ showToast('저장에 실패했어요. 다시 시도해주세요'); return; }
    closeModal();
    openResultForm(result.match);
    showToast('기본 편성으로 되돌렸어요');

  document.getElementById('btnSaveQTeam').addEventListener('click', async ()=>{

    closeModal();
    openResultForm(result.match);
    showToast(`쿼터 ${qi+1} 팀을 별도로 저장했어요`);
  });

function computeStats(){
  const stats = {};
  activeRoster().forEach(m=> stats[m.id] = { id:m.id, name:m.name, number:m.number, goals:0, assists:0, saves:0, apps:0, mom:0 });
  MATCHES.filter(m=>m.status==='done').forEach(m=>{
    const attendedIds = attendedIdsForMatch(m);
    attendedIds.forEach(id=>{ if(stats[id]) stats[id].apps++; });
    (m.quarters||[]).forEach(q=>{
      (q.events||[]).forEach(ev=>{
        if(!stats[ev.memberId]) return;
        if(ev.type==='득점') stats[ev.memberId].goals++;
        else if(ev.type==='도움') stats[ev.memberId].assists++;
        else if(ev.type==='방어') stats[ev.memberId].saves++;
      });
    });
    if(m.result?.mom && stats[m.result.mom]) stats[m.result.mom].mom++;
  });
  return Object.values(stats);
}

function renderLeaderboard(){
  const stats = computeStats().sort((a,b)=> b[lbMode]-a[lbMode] || a.name.localeCompare(b.name));
  const box = document.getElementById('leaderboard');
  const labelMap = {apps:'출석', goals:'득점', assists:'도움', saves:'방어', mom:'MOM'};
  const filtered = stats.filter(s=> s[lbMode] > 0);
  const showList = filtered.length ? filtered : stats.slice(0,0);

  if(activeRoster().length===0){
    box.innerHTML = `<div class="empty"><p>회원을 먼저 등록해주세요.</p></div>`;
    return;
  }
  if(showList.length===0){
    box.innerHTML = `<div class="empty"><p>아직 기록된 ${labelMap[lbMode]} 데이터가 없습니다.<br>경기 결과를 입력하면 랭킹이 표시됩니다.</p></div>`;
    return;
  }
  box.innerHTML = showList.slice(0,20).map((s,i)=>`
    <div class="lb-row">
      <div class="lb-rank">${i+1}</div>
      <div class="jersey" style="width:30px;height:30px;font-size:12px;">${s.number ?? '-'}</div>
      <div class="lb-name">${escapeHTML(s.name)}</div>
      <div class="lb-val">${s[lbMode]}</div>
    </div>
  `).join('');
}

/* ============================================================
   회비결산 (팀 전체, 월단위)
   ============================================================ */
function yearNetBalance(year){
  let total = 0;
  for(let mo=1; mo<=12; mo++) total += monthSettlement(year, mo).balance;
  return total;
}
function carryoverBalance(year){
  const years = availableYears().filter(y=>y<year);
  return years.reduce((sum,y)=> sum + yearNetBalance(y), 0);
}

function renderDuesSettlement(){
  const years = availableYears();
  if(!years.includes(duesSettleYear)) duesSettleYear = years[years.length-1];

  const ySel = document.getElementById('duesYearSelect');
  ySel.innerHTML = `
    <button id="duesYearPrev" ${years.indexOf(duesSettleYear)<=0?'disabled style="opacity:.3;"':''}>‹</button>
    <span class="y">${duesSettleYear}</span>
    <button id="duesYearNext" ${years.indexOf(duesSettleYear)>=years.length-1?'disabled style="opacity:.3;"':''}>›</button>
  `;
  const prevBtn = document.getElementById('duesYearPrev');
  const nextBtn = document.getElementById('duesYearNext');
  if(prevBtn) prevBtn.addEventListener('click', ()=>{ const i=years.indexOf(duesSettleYear); if(i>0){ duesSettleYear=years[i-1]; renderDuesSettlement(); } });
  if(nextBtn) nextBtn.addEventListener('click', ()=>{ const i=years.indexOf(duesSettleYear); if(i<years.length-1){ duesSettleYear=years[i+1]; renderDuesSettlement(); } });

  const rows = [];
  for(let mo=1; mo<=12; mo++) rows.push(monthSettlement(duesSettleYear, mo));
  const yearIncome = rows.reduce((s,r)=>s+r.income,0);
  const yearExpense = rows.reduce((s,r)=>s+r.expense,0);
  const carryover = carryoverBalance(duesSettleYear);

  // 오늘 기준으로 이 연도에서 '확정'으로 볼 수 있는 마지막 달을 정함
  const now = new Date();
  const curYear = now.getFullYear(), curMonth = now.getMonth()+1;
  let cutoffMonth;
  if(duesSettleYear < curYear) cutoffMonth = 12;      // 지난 연도: 12월까지 전부 확정
  else if(duesSettleYear === curYear) cutoffMonth = curMonth; // 올해: 이번 달까지 확정
  else cutoffMonth = 0;                                // 미래 연도: 아직 확정된 달 없음

  // 각 행에 누적잔액(확정분만)을 계산하고, 확정 이후 달은 공란 + 선입금 누계로 분리
  let running = carryover;
  let prepayIncome = 0;
  rows.forEach(r=>{
    if(r.month <= cutoffMonth){
      running += r.balance;
      r.cumBalance = running;
    }else{
      r.cumBalance = null; // 아직 지나지 않은 달 → 공란
      prepayIncome += r.income; // 이미 선납된 금액은 선입금으로 별도 집계
    }
  });

  `;

  document.getElementById('duesLedger').innerHTML = rows.map(r=>`
    <div class="ledger-row">
      <span class="ledger-mo">${r.month}월</span>
      <span class="ledger-val pos">+${r.income.toLocaleString()}</span>
      <span class="ledger-val neg">${r.expense>0?'-':''}${r.expense.toLocaleString()}</span>
      <span class="ledger-val" style="color:${r.cumBalance===null?'var(--chalk-dim)':(r.cumBalance>=0?'var(--chalk)':'#FF9B92')};">${r.cumBalance===null?'-':r.cumBalance.toLocaleString()}</span>
    </div>
  `).join('');

  const yearExpenseByCategory = {};
  EXPENSE_CATEGORIES.forEach(c=> yearExpenseByCategory[c] = 0);
  rows.forEach(r=>{ EXPENSE_CATEGORIES.forEach(c=> yearExpenseByCategory[c] += (r.byCategory?.[c]||0)); });
  document.getElementById('expenseCategoryGrid').innerHTML = `
    <div style="display:grid; grid-template-columns:repeat(5,1fr); gap:6px; text-align:center;">
      ${EXPENSE_CATEGORIES.map(c=>`
        <div>
          <div style="font-size:10px; color:var(--chalk-dim);">${c}</div>
          <div style="font-size:12px; font-weight:700; font-family:'JetBrains Mono',monospace;">${(yearExpenseByCategory[c]||0).toLocaleString()}</div>
        </div>
      `).join('')}
    </div>
  `;

  const yearExpenseEntries = EXPENSES.filter(x=> x.date && new Date(x.date).getFullYear()===duesSettleYear)
    .sort((a,b)=> new Date(b.date)-new Date(a.date));
  const expenseListEl = document.getElementById('expenseList');
  if(!yearExpenseEntries.length){
    expenseListEl.innerHTML = `<div class="empty" style="padding:20px 10px;"><p>등록된 지출 내역이 없습니다.</p></div>`;
  }else{
    expenseListEl.innerHTML = yearExpenseEntries.map(x=>`
      <div class="member-row" data-eid="${x.id}">
        <div class="jersey" style="width:34px;height:34px;font-size:9.5px;">${x.category}</div>
        <div class="member-info">
          <div class="name" style="font-size:13px;">${Number(x.amount).toLocaleString()}원</div>
          <div class="sub">${x.date}${x.note?' · '+escapeHTML(x.note):''}</div>
        </div>
        <button class="btn btn-danger btn-sm" data-expdel="${x.id}">삭제</button>
      </div>
    `).join('');
    expenseListEl.querySelectorAll('[data-expdel]').forEach(btn=>{
      btn.addEventListener('click', async ()=>{
        if(!isExec()){ showToast('지출 삭제는 집행부만 할 수 있어요'); return; }
        const ok = await requireAdminPin('지출 내역 삭제');

        const prevExpenses = EXPENSES;

        showToast('지출 내역을 삭제했습니다');

/* ============================================================
   활동 리포트 생성 (월/분기/반기/연간)
   ============================================================ */
function periodRange(unit, year, sub){
  let startMonth, endMonth, label;
  if(unit === 'month'){ startMonth = sub; endMonth = sub; label = `${year}년 ${sub}월`; }
  else if(unit === 'quarter'){ startMonth = (sub-1)*3+1; endMonth = startMonth+2; label = `${year}년 ${sub}분기`; }
  else if(unit === 'half'){ startMonth = sub===1?1:7; endMonth = sub===1?6:12; label = `${year}년 ${sub===1?'상반기':'하반기'}`; }
  else { startMonth = 1; endMonth = 12; label = `${year}년 연간`; }
  const start = new Date(year, startMonth-1, 1, 0,0,0);
  const end = new Date(year, endMonth, 0, 23,59,59);
  return { start, end, label, unit, year, startMonth, endMonth };
}
function inRange(dateStr, range){
  if(!dateStr) return false;
  const d = new Date(dateStr);
  return d >= range.start && d <= range.end;
}

function computePeriodMemberStats(range){
  const stats = {};
  activeRoster().forEach(m=> stats[m.id] = { id:m.id, name:m.name, number:m.number, role:roleLabel(m), apps:0, goals:0, assists:0, saves:0, mom:0, rsvpYes:0 });
  MATCHES.forEach(m=>{
    if(!inRange(m.date, range)) return;
    Object.keys(m.rsvp||{}).forEach(id=>{ if(stats[id] && rsvpStatus(m,id)==='yes') stats[id].rsvpYes++; });
    if(m.status !== 'done') return;
    attendedIdsForMatch(m).forEach(id=>{ if(stats[id]) stats[id].apps++; });
    (m.quarters||[]).forEach(q=>{
      (q.events||[]).forEach(ev=>{
        if(!stats[ev.memberId]) return;
        if(ev.type==='득점') stats[ev.memberId].goals++;
        else if(ev.type==='도움') stats[ev.memberId].assists++;
        else if(ev.type==='방어') stats[ev.memberId].saves++;
      });
    });
    if(m.result?.mom && stats[m.result.mom]) stats[m.result.mom].mom++;
  });
  return Object.values(stats).sort((a,b)=> b.apps-a.apps || b.goals-a.goals || a.name.localeCompare(b.name));
}

function buildReportHTML(range){
  const matchesInRange = MATCHES.filter(m => inRange(m.date, range)).sort((a,b)=> new Date(a.date)-new Date(b.date));
  const doneMatches = matchesInRange.filter(m=>m.status==='done');
  const internalCount = matchesInRange.filter(m=>m.matchType==='internal').length;
  const externalCount = matchesInRange.filter(m=>m.matchType!=='internal').length;
  const totalQuarters = doneMatches.reduce((s,m)=> s + (m.quarters?.length||0), 0);

  const matchRowsHTML = matchesInRange.map(m=>{
    const isInternal = m.matchType==='internal';
    const typeLabel = isInternal ? '자체경기' : `외부매칭 vs ${escapeHTML(m.opponent||'상대팀')}`;
    const quarterHTML = (m.quarters||[]).map((q,qi)=>{
      const l1 = isInternal ? (TEAM_COLOR_LABEL[q.side1]||q.side1) : '공사랑FC';
      const l2 = isInternal ? (TEAM_COLOR_LABEL[q.side2]||q.side2) : (m.opponent||'상대팀');
      return `<div>Q${qi+1}. ${l1} ${q.score1||0} : ${q.score2||0} ${l2}</div>`;
    }).join('') || '<div style="color:#999;">쿼터 기록 없음</div>';
    return `
      <tr>
        <td>${m.date}${m.time?' '+m.time:''}</td>
        <td>${typeLabel}</td>
        <td>${escapeHTML(m.location||'-')}</td>
        <td>${m.status==='done'?'종료':'예정'}</td>
        <td>${(m.quarters||[]).length}쿼터</td>
        <td style="text-align:left;">${quarterHTML}</td>
      </tr>`;
  }).join('') || `<tr><td colspan="6" style="text-align:center; color:#999;">해당 기간에 등록된 경기가 없습니다.</td></tr>`;

  const months = [];
  for(let d = new Date(range.start.getFullYear(), range.start.getMonth(), 1); d <= range.end; d.setMonth(d.getMonth()+1)){
    months.push({ year: d.getFullYear(), month: d.getMonth()+1 });
  }
  const monthRows = months.map(({year,month}) => monthSettlement(year, month));
  const totalIncome = monthRows.reduce((s,r)=>s+r.income,0);
  const totalExpense = monthRows.reduce((s,r)=>s+r.expense,0);
  const catTotals = {};
  EXPENSE_CATEGORIES.forEach(c=> catTotals[c]=0);
  monthRows.forEach(r=> EXPENSE_CATEGORIES.forEach(c=> catTotals[c] += (r.byCategory?.[c]||0)));
  const budgetRowsHTML = months.map(({year,month},i)=>{
    const r = monthRows[i];
    return `<tr><td>${year}.${String(month).padStart(2,'0')}</td><td>${r.income.toLocaleString()}</td><td>${r.expense.toLocaleString()}</td><td>${r.balance.toLocaleString()}</td></tr>`;
  }).join('');

  const memberStats = computePeriodMemberStats(range);
  const memberRowsHTML = memberStats.map((s,i)=>`
    <tr>
      <td>${i+1}</td><td>${escapeHTML(s.name)}</td><td>${s.role}</td>
      <td>${s.rsvpYes}</td><td>${s.apps}</td><td>${s.goals}</td><td>${s.assists}</td><td>${s.saves}</td><td>${s.mom}</td>
    </tr>`).join('') || `<tr><td colspan="9" style="text-align:center; color:#999;">데이터가 없습니다.</td></tr>`;

  const genAt = new Date().toLocaleString('ko-KR');

  return `<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8">
<title>공사랑FC 활동 리포트 - ${range.label}</title>
<style>
  body{ font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif; color:#1a1a1a; max-width:900px; margin:0 auto; padding:32px 20px; line-height:1.5; }
  h1{ font-size:22px; border-bottom:3px solid #0A1B3D; padding-bottom:10px; }
  h2{ font-size:16px; color:#0A1B3D; margin-top:32px; border-left:5px solid #E8B74D; padding-left:10px; }
  .meta{ color:#666; font-size:12px; margin-bottom:20px; }
  table{ width:100%; border-collapse:collapse; font-size:12.5px; margin-top:10px; }
  th,td{ border:1px solid #ddd; padding:7px 8px; text-align:center; }
  th{ background:#0A1B3D; color:#fff; }
  tr:nth-child(even){ background:#f7f7f7; }
  .summary{ display:flex; gap:12px; margin-top:12px; flex-wrap:wrap; }
  .summary div{ background:#f2f0e6; border-radius:8px; padding:10px 16px; font-size:13px; }
  .summary b{ display:block; font-size:18px; color:#0A1B3D; }
  @media print{ body{ padding:0; } }
</style>
</head><body>
  <h1>⚽ 공사랑FC 활동 리포트</h1>
  <div class="meta">기간: ${range.label} (${range.start.toISOString().slice(0,10)} ~ ${range.end.toISOString().slice(0,10)}) · 생성일시: ${genAt}</div>

  <h2>1. 팀 활동현황</h2>
  <div class="summary">
    <div><b>${matchesInRange.length}</b>총 경기 수</div>
    <div><b>${internalCount}</b>자체경기</div>
    <div><b>${externalCount}</b>외부매칭</div>
    <div><b>${totalQuarters}</b>누적 쿼터 수</div>
  </div>
  <table>
    <tr><th>날짜</th><th>유형</th><th>장소</th><th>상태</th><th>쿼터수</th><th>쿼터별 결과</th></tr>
    ${matchRowsHTML}
  </table>

  <h2>2. 예산집행현황</h2>
  <div class="summary">
    <div><b>${totalIncome.toLocaleString()}</b>기간 수입(원)</div>
    <div><b>${totalExpense.toLocaleString()}</b>기간 지출(원)</div>
    <div><b>${(totalIncome-totalExpense).toLocaleString()}</b>기간 잔액(원)</div>
  </div>
  <table>
    <tr><th>월</th><th>수입</th><th>지출</th><th>잔액</th></tr>
    ${budgetRowsHTML}
  </table>
  <table style="margin-top:14px;">
    <tr>${EXPENSE_CATEGORIES.map(c=>`<th>${c}</th>`).join('')}</tr>
    <tr>${EXPENSE_CATEGORIES.map(c=>`<td>${(catTotals[c]||0).toLocaleString()}</td>`).join('')}</tr>
  </table>

  <h2>3. 개인별 활동현황</h2>
  <table>
    <tr><th>순위</th><th>이름</th><th>직책</th><th>참석신청</th><th>출석</th><th>득점</th><th>도움</th><th>방어</th><th>MOM</th></tr>
    ${memberRowsHTML}
  </table>

  <p style="margin-top:30px; color:#999; font-size:11px;">본 리포트는 공사랑FC 앱에서 자동 생성되었습니다.</p>
</body></html>`;
}

/* ============================================================
   유틸
   ============================================================ */
function escapeHTML(str){
  if(str===null||str===undefined) return '';
  return String(str).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* ============================================================
