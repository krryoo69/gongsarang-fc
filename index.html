<style>
  :root{
    --pitch-dark:#0A1B3D;
    --pitch:#123063;
    --turf:#1B3E7A;
    --turf-light:#2F63B8;
    --chalk:#F5F3EA;
    --chalk-dim:#DDD8C8;
    --gold:#E8A33D;
    --gold-dim:#B9852F;
    --red:#C1443C;
    --ink:#0B241B;
    --line-white:rgba(245,243,234,0.14);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    font-family:'Inter',sans-serif;
    background:var(--pitch-dark);
    color:var(--chalk);
    overscroll-behavior:none;
  }
  #app{
    max-width:480px;
    margin:0 auto;
    min-height:100vh;
    background:
      radial-gradient(circle at 50% -10%, rgba(47,99,184,0.35), transparent 55%),
      repeating-linear-gradient(0deg, rgba(255,255,255,0.02) 0 60px, rgba(255,255,255,0.00) 60px 120px),
      var(--pitch-dark);
    display:flex;
    flex-direction:column;
    position:relative;
  }

  /* ---------- HEADER ---------- */
  header.top{
    padding:18px 18px 14px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    border-bottom:1px solid var(--line-white);
    position:sticky; top:0; z-index:20;
    background:rgba(15,61,46,0.92);
    backdrop-filter:blur(6px);
  }
  .brand{display:flex; align-items:center; gap:10px;}
  .crest{
    width:40px;height:40px;border-radius:50%;
    overflow:hidden;
    flex-shrink:0;
    border:2px solid var(--gold);
    box-shadow:0 0 0 3px rgba(232,163,61,0.15);
    background:var(--pitch);
  }
  .crest img{width:100%;height:100%;object-fit:cover; transform:scale(1.35);}
  .hero-crest{
    display:flex; flex-direction:column; align-items:center; text-align:center;
    padding:10px 0 22px;
  }
  .hero-crest img{
    width:112px; height:112px; object-fit:contain;
    filter:drop-shadow(0 8px 20px rgba(0,0,0,0.45));
    margin-bottom:10px;
  }
  .hero-crest .hc-title{font-family:'Oswald',sans-serif; font-size:20px; font-weight:700; letter-spacing:1px;}
  .hero-crest .hc-sub{font-size:10.5px; letter-spacing:2.5px; color:var(--gold); text-transform:uppercase; margin-top:3px;}
  .brand h1{
    font-family:'Oswald',sans-serif;
    font-size:18px; letter-spacing:0.5px; margin:0; font-weight:600;
  }
  .brand small{display:block; font-size:10.5px; color:var(--chalk-dim); letter-spacing:1.5px; text-transform:uppercase; margin-top:1px;}
  .sync-pill{
    font-size:10px; color:var(--chalk-dim); border:1px solid var(--line-white);
    padding:4px 8px; border-radius:20px; display:flex; align-items:center; gap:5px;
  }
  .sync-dot{width:6px;height:6px;border-radius:50%;background:var(--turf-light); box-shadow:0 0 6px var(--turf-light);}

  main{flex:1; padding:16px 16px 96px; overflow-y:auto;}
  .screen{display:none; animation:fadeIn .25s ease;}
  .screen.active{display:block;}
  @keyframes fadeIn{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);}}

  h2.section-title{
    font-family:'Oswald',sans-serif; font-size:13px; letter-spacing:1.5px; text-transform:uppercase;
    color:var(--gold); margin:22px 0 10px; display:flex; align-items:center; gap:8px;
  }
  h2.section-title:first-child{margin-top:0;}
  h2.section-title .num{
    font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--pitch-dark);
    background:var(--gold); width:18px;height:18px;border-radius:4px;
    display:flex;align-items:center;justify-content:center; flex-shrink:0;
  }

  /* ---------- CARDS ---------- */
  .card{
    background:linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
    border:1px solid var(--line-white);
    border-radius:14px;
    padding:14px 16px;
    margin-bottom:10px;
  }
  .stat-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:4px;}
  .stat-box{
    background:rgba(0,0,0,0.18); border:1px solid var(--line-white); border-radius:12px;
    padding:12px 8px; text-align:center;
  }
  .stat-box .n{font-family:'JetBrains Mono',monospace; font-size:22px; font-weight:700; color:var(--chalk);}
  .stat-box .l{font-size:10px; color:var(--chalk-dim); letter-spacing:0.5px; margin-top:2px;}

  .match-card{
    background:linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));
    border:1px solid var(--line-white); border-radius:14px; padding:0; margin-bottom:12px; overflow:hidden;
  }
  .match-head{
    padding:10px 14px; display:flex; justify-content:space-between; align-items:center;
    background:rgba(0,0,0,0.2); font-size:11px; color:var(--chalk-dim); letter-spacing:0.5px;
  }
  .match-status{
    font-size:9.5px; padding:2px 8px; border-radius:20px; letter-spacing:0.5px; font-weight:600;
  }
  .match-status.upcoming{background:rgba(47,99,184,0.25); color:#8FB8F0; border:1px solid rgba(143,184,240,0.3);}
  .match-status.done{background:rgba(232,163,61,0.18); color:var(--gold); border:1px solid rgba(232,163,61,0.3);}
  .match-body{padding:14px;}
  .match-vs{display:flex; align-items:center; justify-content:space-between; margin-bottom:10px;}
  .team-name{font-family:'Oswald',sans-serif; font-size:15px; font-weight:600;}
  .score{font-family:'JetBrains Mono',monospace; font-size:26px; font-weight:700; color:var(--gold); letter-spacing:2px;}
  .match-meta{font-size:11.5px; color:var(--chalk-dim); line-height:1.7;}
  .match-actions{display:flex; gap:8px; margin-top:12px;}

  /* ---------- BUTTONS ---------- */
  .btn{
    font-family:'Inter',sans-serif; font-weight:600; font-size:12.5px;
    border:none; border-radius:10px; padding:9px 14px; cursor:pointer;
    transition:transform .1s ease, opacity .15s ease;
  }
  .btn:active{transform:scale(0.96);}
  .btn-primary{background:var(--gold); color:var(--ink);}
  .btn-primary:hover{opacity:.92;}
  .btn-ghost{background:rgba(255,255,255,0.08); color:var(--chalk); border:1px solid var(--line-white);}
  .btn-danger{background:rgba(193,68,60,0.18); color:#FF9B92; border:1px solid rgba(255,155,146,0.3);}
  .btn-block{width:100%;}
  .btn-sm{padding:6px 10px; font-size:11px;}
  .fab{
    position:fixed; right:calc(50% - 240px + 18px); bottom:88px; z-index:30;
    width:52px; height:52px; border-radius:50%; background:var(--gold); color:var(--ink);
    display:flex; align-items:center; justify-content:center; font-size:26px; font-weight:700;
    border:none; box-shadow:0 6px 18px rgba(0,0,0,0.4); cursor:pointer;
  }
  @media (max-width:480px){ .fab{ right:18px; } }

  /* ---------- FORMS ---------- */
  label{display:block; font-size:11px; color:var(--chalk-dim); margin:10px 0 5px; letter-spacing:0.3px;}
  input, select, textarea{
    width:100%; background:rgba(0,0,0,0.25); border:1px solid var(--line-white); border-radius:9px;
    padding:10px 12px; color:var(--chalk); font-size:14px; font-family:'Inter',sans-serif;
  }
  input:focus, select:focus, textarea:focus{outline:none; border-color:var(--gold);}
  .row2{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  .chip-select{display:flex; gap:6px; flex-wrap:wrap; margin-top:4px;}
  .chip{
    padding:6px 12px; border-radius:20px; font-size:12px; border:1px solid var(--line-white);
    background:rgba(0,0,0,0.2); color:var(--chalk-dim); cursor:pointer;
  }
  .chip.active{background:var(--gold); color:var(--ink); border-color:var(--gold); font-weight:600;}

  /* ---------- MEMBER LIST ---------- */
  .member-row{
    display:flex; align-items:center; gap:12px; padding:11px 4px; border-bottom:1px solid var(--line-white);
    cursor:pointer;
  }
  .member-row:last-child{border-bottom:none;}
  .jersey{
    width:38px;height:38px;border-radius:9px; background:var(--pitch); border:1.5px solid var(--gold-dim);
    display:flex;align-items:center;justify-content:center; font-family:'JetBrains Mono',monospace;
    font-weight:700; font-size:14px; color:var(--gold); flex-shrink:0;
  }
  .member-info{flex:1; min-width:0;}
  .member-info .name{font-size:14.5px; font-weight:600; display:flex; align-items:center; gap:6px;}
  .member-info .sub{font-size:11px; color:var(--chalk-dim); margin-top:1px;}
  .role-tag{font-size:9px; background:rgba(232,163,61,0.18); color:var(--gold); padding:1px 6px; border-radius:5px; font-weight:600;}
  .dues-dot{width:9px;height:9px;border-radius:50%; flex-shrink:0;}
  .dues-dot.paid{background:var(--turf-light); box-shadow:0 0 6px var(--turf-light);}
  .dues-dot.unpaid{background:var(--red); box-shadow:0 0 6px var(--red);}

  .search-bar{position:relative; margin-bottom:10px;}
  .search-bar input{padding-left:34px;}
  .search-bar::before{content:'⚲'; position:absolute; left:12px; top:50%; transform:translateY(-50%) rotate(90deg); color:var(--chalk-dim); font-size:13px;}

  /* ---------- RSVP ---------- */
  .rsvp-list .member-row{cursor:default;}
  .rsvp-btns{display:flex; gap:5px;}
  .rsvp-btn{
    width:30px;height:30px;border-radius:8px; border:1px solid var(--line-white); background:rgba(0,0,0,0.2);
    color:var(--chalk-dim); font-size:13px; cursor:pointer;
  }
  .rsvp-btn.yes.active{background:var(--turf-light); color:#fff; border-color:var(--turf-light);}
  .rsvp-btn.no.active{background:var(--red); color:#fff; border-color:var(--red);}
  .rsvp-btn.maybe.active{background:var(--gold); color:var(--ink); border-color:var(--gold);}

  /* ---------- LEADERBOARD ---------- */
  .lb-row{display:flex; align-items:center; gap:10px; padding:10px 4px; border-bottom:1px solid var(--line-white);}
  .lb-row:last-child{border-bottom:none;}
  .lb-rank{
    font-family:'JetBrains Mono',monospace; font-weight:700; font-size:13px; width:22px; text-align:center;
    color:var(--chalk-dim);
  }
  .lb-row:nth-child(1) .lb-rank{color:var(--gold); font-size:16px;}
  .lb-row:nth-child(2) .lb-rank{color:#C7CCD4;}
  .lb-row:nth-child(3) .lb-rank{color:#C98A4B;}
  .lb-name{flex:1; font-size:13.5px; font-weight:600;}
  .lb-val{font-family:'JetBrains Mono',monospace; font-weight:700; color:var(--gold); font-size:14px;}
  .lb-tabs{display:flex; gap:6px; margin-bottom:12px;}

  /* ---------- EMPTY STATE ---------- */
  .empty{
    text-align:center; padding:40px 20px; color:var(--chalk-dim);
  }
  .empty .ball{font-size:34px; margin-bottom:10px; opacity:.6;}
  .empty p{font-size:12.5px; line-height:1.6;}

  /* ---------- MODAL ---------- */
  .overlay{
    position:fixed; inset:0; background:rgba(0,0,0,0.55); z-index:50; display:none;
    align-items:flex-end; justify-content:center;
  }
  .overlay.active{display:flex;}
  .modal{
    background:var(--pitch-dark); border:1px solid var(--line-white); border-top-left-radius:20px; border-top-right-radius:20px;
    width:100%; max-width:480px; max-height:88vh; overflow-y:auto; padding:20px 18px 28px;
    animation:slideUp .25s ease;
  }
  @keyframes slideUp{from{transform:translateY(30px); opacity:0;} to{transform:translateY(0); opacity:1;}}
  .modal-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:6px;}
  .modal-head h3{font-family:'Oswald',sans-serif; font-size:17px; margin:0;}
  .close-x{background:none; border:none; color:var(--chalk-dim); font-size:20px; cursor:pointer; padding:4px;}
  .modal-foot{display:flex; gap:8px; margin-top:18px;}

  /* ---------- BOTTOM NAV ---------- */
  nav.bottom{
    position:fixed; bottom:0; left:50%; transform:translateX(-50%);
    width:100%; max-width:480px; background:rgba(11,36,27,0.96); backdrop-filter:blur(8px);
    border-top:1px solid var(--line-white); display:flex; z-index:25;
    padding-bottom:env(safe-area-inset-bottom);
  }
  nav.bottom button{
    flex:1; background:none; border:none; color:var(--chalk-dim); padding:10px 4px 8px;
    display:flex; flex-direction:column; align-items:center; gap:3px; cursor:pointer; font-family:'Inter',sans-serif;
  }
  nav.bottom button .ic{font-size:19px;}
  nav.bottom button .lb{font-size:10px; letter-spacing:0.3px;}
  nav.bottom button.active{color:var(--gold);}

  .toast{
    position:fixed; bottom:78px; left:50%; transform:translateX(-50%); background:var(--chalk); color:var(--ink);
    padding:10px 18px; border-radius:30px; font-size:12.5px; font-weight:600; z-index:60; opacity:0; pointer-events:none;
    transition:opacity .25s ease, transform .25s ease; white-space:nowrap;
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(-6px);}

  /* ---------- YEAR SELECTOR ---------- */
  .year-select{display:flex; align-items:center; justify-content:center; gap:16px; margin-bottom:14px;}
  .year-select button{
    width:30px;height:30px;border-radius:8px; border:1px solid var(--line-white); background:rgba(0,0,0,0.2);
    color:var(--chalk); font-size:14px; cursor:pointer;
  }
  .year-select .y{font-family:'JetBrains Mono',monospace; font-size:16px; font-weight:700; color:var(--gold); min-width:60px; text-align:center;}

  /* ---------- ATTENDANCE ---------- */
  .attend-rate-bar{
    height:8px; border-radius:6px; background:rgba(0,0,0,0.25); overflow:hidden; margin-top:4px;
  }
  .attend-rate-fill{height:100%; background:linear-gradient(90deg, var(--turf-light), var(--gold));}
  .attend-rate-label{display:flex; justify-content:space-between; font-size:11px; color:var(--chalk-dim); margin-top:6px;}

  /* ---------- DUES MONTH GRID ---------- */
  .half-label{font-size:11px; color:var(--chalk-dim); letter-spacing:0.5px; margin:12px 0 6px; display:flex; justify-content:space-between;}
  .half-label b{color:var(--chalk); font-weight:600;}
  .month-grid{display:grid; grid-template-columns:repeat(6,1fr); gap:6px;}
  .month-cell{
    aspect-ratio:1; border-radius:9px; border:1px solid var(--line-white); background:rgba(0,0,0,0.2);
    display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer;
    font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--chalk-dim); gap:2px;
  }
  .month-cell.paid{background:rgba(47,99,184,0.25); border-color:var(--turf-light); color:var(--chalk);}
  .month-cell.unpaid{background:rgba(193,68,60,0.12); border-color:rgba(193,68,60,0.35); color:#FF9B92;}
  .month-cell .dotmark{width:6px;height:6px;border-radius:50%;}
  .month-cell.paid .dotmark{background:var(--turf-light);}
  .month-cell.unpaid .dotmark{background:var(--red);}
  .month-cell.future{opacity:0.35; cursor:default;}

  /* ---------- SETTLEMENT LEDGER ---------- */
  .ledger-row{
    display:grid; grid-template-columns:38px 1fr 1fr 1fr; gap:6px; align-items:center;
    padding:9px 4px; border-bottom:1px solid var(--line-white); font-size:12px;
  }
  .ledger-row:last-child{border-bottom:none;}
  .ledger-row.head{color:var(--chalk-dim); font-size:10px; letter-spacing:0.4px; padding-bottom:8px;}
  .ledger-mo{font-family:'Oswald',sans-serif; font-weight:600; color:var(--gold); font-size:13px;}
  .ledger-val{font-family:'JetBrains Mono',monospace; font-size:11.5px; text-align:right;}
  .ledger-val.pos{color:#8FB8F0;}
  .ledger-val.neg{color:#FF9B92;}
  .gear-btn{
    background:rgba(255,255,255,0.08); border:1px solid var(--line-white); color:var(--gold);
    width:32px;height:32px;border-radius:9px; font-size:14px; cursor:pointer; flex-shrink:0;
  }
  .settle-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:2px;}
  .detail-header{display:flex; align-items:center; gap:12px; margin-bottom:16px;}
  .detail-header .jersey{width:46px;height:46px;font-size:16px;}
  .detail-header .name{font-family:'Oswald',sans-serif; font-size:17px; font-weight:600;}
  .detail-header .sub{font-size:11.5px; color:var(--chalk-dim); margin-top:2px;}

  ::-webkit-scrollbar{width:0;}
</style>
</head>
<body>
<div id="app">

  <header class="top">
    <div class="brand">
      <div class="crest"><img id="crestImg" alt="공사랑FC"></div>
      <div>
        <h1>공사랑FC</h1>
        <small id="memberCountLabel">회원 0명</small>
      </div>
    </div>
    <div class="sync-pill"><span class="sync-dot"></span>공유 저장됨</div>
  </header>

  <main>

    <!-- ================= 홈 ================= -->
    <section class="screen active" id="screen-home">
      <div class="hero-crest">
        <img id="heroCrestImg" alt="공사랑FC 엠블럼">
        <div class="hc-title">공사랑FC</div>
        <div class="hc-sub">FUTSAL TEAM · EST. 2025</div>
      </div>
      <h2 class="section-title"><span class="num">1</span>이번 주 경기</h2>
      <div id="homeNextMatch"></div>

      <h2 class="section-title"><span class="num">2</span>팀 현황</h2>
      <div class="stat-grid">
        <div class="stat-box"><div class="n" id="homeMemberCount">0</div><div class="l">전체 회원</div></div>
        <div class="stat-box"><div class="n" id="homeUnpaidCount">0</div><div class="l">회비 미납</div></div>
        <div class="stat-box"><div class="n" id="homeMatchCount">0</div><div class="l">누적 경기</div></div>
      </div>

      <h2 class="section-title"><span class="num">3</span>최근 결과</h2>
      <div id="homeRecentResults"></div>
    </section>

    <!-- ================= 회원 ================= -->
    <section class="screen" id="screen-members">
      <div class="search-bar">
        <input type="text" id="memberSearch" placeholder="이름 또는 등번호 검색">
      </div>
      <h2 class="section-title" style="margin-top:6px;"><span class="num">·</span>명단 (<span id="memberListCount">0</span>/50)</h2>
      <div class="card" style="padding:4px 12px;" id="memberList"></div>
    </section>

    <!-- ================= 경기 ================= -->
    <section class="screen" id="screen-matches">
      <h2 class="section-title"><span class="num">·</span>예정된 경기</h2>
      <div id="upcomingMatches"></div>
      <h2 class="section-title"><span class="num">·</span>지난 경기</h2>
      <div id="pastMatches"></div>
    </section>

    <!-- ================= 기록 ================= -->
    <section class="screen" id="screen-stats">
      <h2 class="section-title"><span class="num">·</span>시즌 랭킹</h2>
      <div class="lb-tabs">
        <button class="chip active" data-lb="goals">⚽ 득점</button>
        <button class="chip" data-lb="assists">🅰️ 도움</button>
        <button class="chip" data-lb="apps">📅 출석</button>
        <button class="chip" data-lb="mom">🏅 MOM</button>
      </div>
      <div class="card" id="leaderboard"></div>
    </section>

    <!-- ================= 회비결산 ================= -->
    <section class="screen" id="screen-dues">
      <div class="settle-head">
        <h2 class="section-title" style="margin:0;"><span class="num">·</span>월별 회비 결산</h2>
        <button class="gear-btn" id="btnDuesSettings" title="월 회비 금액 설정">⚙️</button>
      </div>
      <div class="year-select" id="duesYearSelect"></div>

      <div class="stat-grid" id="duesSummaryGrid"></div>

      <div class="card" style="padding:10px 12px; margin-top:10px;">
        <div class="ledger-row head">
          <span>월</span><span style="text-align:right;">수입(납부)</span><span style="text-align:right;">지출(경기비)</span><span style="text-align:right;">잔액</span>
        </div>
        <div id="duesLedger"></div>
      </div>
    </section>

  </main>

  <button class="fab" id="fabBtn">+</button>

  <nav class="bottom">
    <button class="nav-btn active" data-screen="home"><span class="ic">🏠</span><span class="lb">홈</span></button>
    <button class="nav-btn" data-screen="members"><span class="ic">👥</span><span class="lb">회원</span></button>
    <button class="nav-btn" data-screen="matches"><span class="ic">⚽</span><span class="lb">경기</span></button>
    <button class="nav-btn" data-screen="stats"><span class="ic">🏆</span><span class="lb">기록</span></button>
    <button class="nav-btn" data-screen="dues"><span class="ic">💰</span><span class="lb">회비</span></button>
  </nav>

</div>

<div class="overlay" id="overlay"><div class="modal" id="modalBody"></div></div>
<div class="toast" id="toast"></div>

<script>
/* ============================================================
   상태 / 저장소
   ============================================================ */
let MEMBERS = [];
let MATCHES = [];
let SETTINGS = { monthlyDues: 30000 };
let currentScreen = 'home';
let lbMode = 'goals';
let detailYear = new Date().getFullYear();
let duesSettleYear = new Date().getFullYear();

const POSITIONS = ['GK','DF','MF','FW'];
const ROLES = ['회원','주장','부주장','총무','회계'];

/* ============================================================
   Supabase 저장소 연동 (window.storage 대체)
   ============================================================ */
const SUPABASE_URL = 'https://mwbldjggesjloaqalium.supabase.co';
const SUPABASE_KEY = 'sb_publishable_qLmu-mpQAeUCdMKoCSJsEw_oU7vB3ZP';

async function dbGet(key){
  const res = await fetch(
    `${SUPABASE_URL}/rest/v1/app_storage?key=eq.${encodeURIComponent(key)}&select=value`,
    { headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` } }
  );
  if(!res.ok) throw new Error('supabase get failed: ' + res.status);
  const rows = await res.json();
  if(!rows.length || rows[0].value === null || rows[0].value === undefined) return null;
  return { key, value: JSON.stringify(rows[0].value) };
}

async function dbSet(key, valueStr){
  const parsed = JSON.parse(valueStr);
  const res = await fetch(`${SUPABASE_URL}/rest/v1/app_storage`, {
    method: 'POST',
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json',
      Prefer: 'resolution=merge-duplicates'
    },
    body: JSON.stringify([{ key, value: parsed, updated_at: new Date().toISOString() }])
  });
  if(!res.ok) throw new Error('supabase set failed: ' + res.status);
  return { key, value: valueStr };
}

function uid(prefix){ return prefix + '_' + Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function monthKey(d){ const dt = d ? new Date(d) : new Date(); return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0'); }
function todayMonthKey(){ return monthKey(new Date()); }

async function loadData(){
  try{
    const m = await dbGet('members');
    MEMBERS = m ? JSON.parse(m.value) : [];
  }catch(e){ MEMBERS = []; showToast('회원 데이터를 불러오지 못했어요'); }
  try{
    const mt = await dbGet('matches');
    MATCHES = mt ? JSON.parse(mt.value) : [];
  }catch(e){ MATCHES = []; showToast('경기 데이터를 불러오지 못했어요'); }
  try{
    const st = await dbGet('settings');
    SETTINGS = st ? JSON.parse(st.value) : { monthlyDues: 30000 };
  }catch(e){ SETTINGS = { monthlyDues: 30000 }; }
  updateFabVisibility();
  renderAll();
}
async function saveMembers(){
  try{ await dbSet('members', JSON.stringify(MEMBERS)); }
  catch(e){ showToast('저장 실패 - 다시 시도해주세요'); }
}
async function saveMatches(){
  try{ await dbSet('matches', JSON.stringify(MATCHES)); }
  catch(e){ showToast('저장 실패 - 다시 시도해주세요'); }
}
async function saveSettings(){
  try{ await dbSet('settings', JSON.stringify(SETTINGS)); }
  catch(e){ showToast('저장 실패 - 다시 시도해주세요'); }
}

/* ============================================================
   연도 / 출석 / 회비 계산 헬퍼
   ============================================================ */
function availableYears(){
  const years = new Set([new Date().getFullYear()]);
  MATCHES.forEach(m=>{ if(m.date) years.add(new Date(m.date).getFullYear()); });
  return Array.from(years).sort((a,b)=>a-b);
}
function attendedIdsForMatch(m){
  const ids = new Set();
  (m.teams?.A||[]).forEach(id=>ids.add(id));
  (m.teams?.B||[]).forEach(id=>ids.add(id));
  if(ids.size===0){
    Object.keys(m.rsvp||{}).forEach(id=>{ if(m.rsvp[id]==='yes') ids.add(id); });
  }
  return ids;
}
function memberYearStats(memberId, year){
  const inYear = MATCHES.filter(m => m.date && new Date(m.date).getFullYear() === year);
  const total = inYear.length;
  const reserved = inYear.filter(m => (m.rsvp||{})[memberId] === 'yes').length;
  const attended = inYear.filter(m => m.status==='done' && attendedIdsForMatch(m).has(memberId)).length;
  return { total, reserved, attended };
}
function monthSettlement(year, month){
  const key = year + '-' + String(month).padStart(2,'0');
  const paidCount = MEMBERS.filter(m => m.dues && m.dues[key]).length;
  const income = paidCount * (Number(SETTINGS.monthlyDues)||0);
  const expense = MATCHES.filter(m=>{
    if(!m.date || !m.cost) return false;
    const d = new Date(m.date);
    return d.getFullYear()===year && (d.getMonth()+1)===month;
  }).reduce((sum,m)=> sum + (Number(m.cost)||0), 0);
  return { month, paidCount, income, expense, balance: income - expense };
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(()=> t.classList.remove('show'), 1800);
}

/* ============================================================
   네비게이션
   ============================================================ */
document.querySelectorAll('.nav-btn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    currentScreen = btn.dataset.screen;
    document.getElementById('screen-'+currentScreen).classList.add('active');
    updateFabVisibility();
    renderAll();
  });
});

document.getElementById('fabBtn').addEventListener('click', ()=>{
  if(currentScreen === 'members') openMemberForm();
  else if(currentScreen === 'matches') openMatchForm();
  else if(currentScreen === 'dues') openDuesSettingsForm();
  else if(currentScreen === 'stats') showToast('회원/경기 탭에서 + 버튼을 눌러보세요');
  else openMemberForm();
});

function updateFabVisibility(){
  const fab = document.getElementById('fabBtn');
  fab.style.display = (currentScreen==='members' || currentScreen==='matches') ? 'flex' : 'none';
  fab.textContent = '+';
}

document.getElementById('btnDuesSettings').addEventListener('click', openDuesSettingsForm);

function closeModal(){ document.getElementById('overlay').classList.remove('active'); document.getElementById('modalBody').innerHTML=''; }
document.getElementById('overlay').addEventListener('click', (e)=>{ if(e.target.id==='overlay') closeModal(); });

/* ============================================================
   렌더링 총괄
   ============================================================ */
function renderAll(){
  document.getElementById('memberCountLabel').textContent = `회원 ${MEMBERS.length}명`;
  if(currentScreen==='home') renderHome();
  if(currentScreen==='members') renderMemberList();
  if(currentScreen==='matches') renderMatches();
  if(currentScreen==='stats') renderLeaderboard();
  if(currentScreen==='dues') renderDuesSettlement();
}

/* ============================================================
   홈
   ============================================================ */
function renderHome(){
  const upcoming = MATCHES.filter(m=>m.status==='upcoming').sort((a,b)=> new Date(a.date+'T'+(a.time||'00:00')) - new Date(b.date+'T'+(b.time||'00:00')));
  const next = upcoming[0];
  const box = document.getElementById('homeNextMatch');
  if(!next){
    box.innerHTML = `<div class="empty"><div class="ball">⚽</div><p>예정된 경기가 없습니다.<br>경기 탭에서 새 경기를 등록해보세요.</p></div>`;
  }else{
    box.innerHTML = matchCardHTML(next, true);
    bindMatchCardEvents(box);
  }

  document.getElementById('homeMemberCount').textContent = MEMBERS.length;
  const mk = todayMonthKey();
  const unpaid = MEMBERS.filter(m => !(m.dues && m.dues[mk])).length;
  document.getElementById('homeUnpaidCount').textContent = unpaid;
  document.getElementById('homeMatchCount').textContent = MATCHES.filter(m=>m.status==='done').length;

  const recent = MATCHES.filter(m=>m.status==='done').sort((a,b)=> new Date(b.date)-new Date(a.date)).slice(0,3);
  const rBox = document.getElementById('homeRecentResults');
  if(recent.length===0){
    rBox.innerHTML = `<div class="empty" style="padding:24px 12px;"><p>아직 종료된 경기가 없습니다.</p></div>`;
  }else{
    rBox.innerHTML = recent.map(m=> matchCardHTML(m,false)).join('');
  }
}

/* ============================================================
   회원 관리
   ============================================================ */
function memberById(id){ return MEMBERS.find(m=>m.id===id); }

function renderMemberList(){
  document.getElementById('memberListCount').textContent = MEMBERS.length;
  const q = (document.getElementById('memberSearch').value || '').trim().toLowerCase();
  const list = document.getElementById('memberList');
  let filtered = MEMBERS.filter(m => !q || m.name.toLowerCase().includes(q) || String(m.number).includes(q));
  filtered = filtered.sort((a,b)=> (a.number||999)-(b.number||999));

  if(MEMBERS.length===0){
    list.innerHTML = `<div class="empty"><div class="ball">👕</div><p>등록된 회원이 없습니다.<br>오른쪽 아래 + 버튼으로 회원을 추가해보세요.</p></div>`;
    return;
  }
  if(filtered.length===0){
    list.innerHTML = `<div class="empty"><p>검색 결과가 없습니다.</p></div>`;
    return;
  }
  const mk = todayMonthKey();
  list.innerHTML = filtered.map(m=>{
    const paid = m.dues && m.dues[mk];
    return `
    <div class="member-row" data-id="${m.id}">
      <div class="jersey">${m.number ?? '-'}</div>
      <div class="member-info">
        <div class="name">${escapeHTML(m.name)} ${m.role && m.role!=='회원' ? `<span class="role-tag">${m.role}</span>` : ''}</div>
        <div class="sub">${m.position || '-'} · ${m.phone || '연락처 없음'}</div>
      </div>
      <div class="dues-dot ${paid?'paid':'unpaid'}" title="${paid?'이번달 회비 납부':'이번달 회비 미납'}"></div>
    </div>`;
  }).join('');

  list.querySelectorAll('.member-row').forEach(row=>{
    row.addEventListener('click', ()=> openMemberDetail(row.dataset.id));
  });
}
document.getElementById('memberSearch').addEventListener('input', renderMemberList);

function openMemberDetail(id){
  const m = memberById(id);
  if(!m) return;
  const years = availableYears();
  detailYear = years.includes(new Date().getFullYear()) ? new Date().getFullYear() : years[years.length-1];

  const html = `
    <div class="modal-head"><h3>활동현황</h3><button class="close-x" onclick="closeModal()">✕</button></div>
    <div class="detail-header">
      <div class="jersey">${m.number ?? '-'}</div>
      <div>
        <div class="name">${escapeHTML(m.name)} ${m.role && m.role!=='회원' ? `<span class="role-tag">${m.role}</span>` : ''}</div>
        <div class="sub">${m.position || '-'} · ${m.phone || '연락처 없음'}</div>
      </div>
    </div>
    <div class="year-select" id="detailYearSelect"></div>
    <div id="detailBody"></div>
    <div class="modal-foot">
      <button class="btn btn-ghost btn-block" onclick="closeModal()">닫기</button>
      <button class="btn btn-primary btn-block" id="btnGoEditMember">정보 수정</button>
    </div>
  `;
  document.getElementById('modalBody').innerHTML = html;
  document.getElementById('overlay').classList.add('active');

  document.getElementById('btnGoEditMember').addEventListener('click', ()=>{
    closeModal();
    openMemberForm(m.id);
  });

  renderMemberDetail(m, years);
}

function renderMemberDetail(m, years){
  const ySel = document.getElementById('detailYearSelect');
  ySel.innerHTML = `
    <button id="detailYearPrev" ${years.indexOf(detailYear)<=0?'disabled style="opacity:.3;"':''}>‹</button>
    <span class="y">${detailYear}</span>
    <button id="detailYearNext" ${years.indexOf(detailYear)>=years.length-1?'disabled style="opacity:.3;"':''}>›</button>
  `;
  const prevBtn = document.getElementById('detailYearPrev');
  const nextBtn = document.getElementById('detailYearNext');
  if(prevBtn) prevBtn.addEventListener('click', ()=>{ const i=years.indexOf(detailYear); if(i>0){ detailYear=years[i-1]; renderMemberDetail(m, years); } });
  if(nextBtn) nextBtn.addEventListener('click', ()=>{ const i=years.indexOf(detailYear); if(i<years.length-1){ detailYear=years[i+1]; renderMemberDetail(m, years); } });

  const s = memberYearStats(m.id, detailYear);
  const rate = s.total>0 ? Math.round((s.attended/s.total)*100) : 0;

  const months = [];
  for(let mo=1; mo<=12; mo++){
    const key = detailYear + '-' + String(mo).padStart(2,'0');
    months.push({ mo, key, paid: !!(m.dues && m.dues[key]) });
  }
  const isFutureMonth = (mo) => {
    const now = new Date();
    return detailYear > now.getFullYear() || (detailYear === now.getFullYear() && mo > now.getMonth()+1);
  };
  const h1 = months.slice(0,6), h2 = months.slice(6,12);
  const h1paid = h1.filter(x=>x.paid).length, h2paid = h2.filter(x=>x.paid).length;

  const monthCellHTML = (item) => {
    const future = isFutureMonth(item.mo);
    return `<div class="month-cell ${future?'future':(item.paid?'paid':'unpaid')}" data-key="${item.key}" data-future="${future}">
      <span class="dotmark"></span>${item.mo}월
    </div>`;
  };

  document.getElementById('detailBody').innerHTML = `
    <h2 class="section-title"><span class="num">1</span>출석현황 (${detailYear}년)</h2>
    <div class="stat-grid">
      <div class="stat-box"><div class="n">${s.total}</div><div class="l">총 경기일</div></div>
      <div class="stat-box"><div class="n">${s.reserved}</div><div class="l">예약일</div></div>
      <div class="stat-box"><div class="n">${s.attended}</div><div class="l">출석일</div></div>
    </div>
    <div class="card" style="padding:12px 14px;">
      <div class="attend-rate-bar"><div class="attend-rate-fill" style="width:${rate}%;"></div></div>
      <div class="attend-rate-label"><span>출석률</span><span>${rate}%</span></div>
    </div>

    <h2 class="section-title"><span class="num">2</span>회비납부현황 (${detailYear}년 · 반기별)</h2>
    <div class="card" style="padding:12px 14px;">
      <div class="half-label">상반기 (1~6월) <b>${h1paid}/6 납부</b></div>
      <div class="month-grid">${h1.map(monthCellHTML).join('')}</div>
      <div class="half-label">하반기 (7~12월) <b>${h2paid}/6 납부</b></div>
      <div class="month-grid">${h2.map(monthCellHTML).join('')}</div>
      <div style="font-size:10.5px; color:var(--chalk-dim); margin-top:10px;">칸을 눌러 납부 여부를 바로 변경할 수 있어요.</div>
    </div>
  `;

  document.querySelectorAll('#detailBody .month-cell').forEach(cell=>{
    if(cell.dataset.future === 'true') return;
    cell.addEventListener('click', async ()=>{
      const key = cell.dataset.key;
      m.dues = m.dues || {};
      m.dues[key] = !m.dues[key];
      await saveMembers();
      renderMemberDetail(m, years);
      renderAll();
    });
  });
}

    <div class="chip-select" id="f_role">

      <button class="btn btn-primary btn-block" id="btnSaveMember">저장</button>
    </div>
  `;

  document.getElementById('overlay').classList.add('active');

  bindChipGroup('f_role');
  bindChipGroup('f_dues');

  document.getElementById('btnSaveMember').addEventListener('click', async ()=>{
    const name = document.getElementById('f_name').value.trim();
    if(!name){ showToast('이름을 입력해주세요'); return; }
    if(!m && MEMBERS.length>=50){ showToast('최대 50명까지 등록 가능합니다'); return; }
    const number = document.getElementById('f_number').value;
    const phone = document.getElementById('f_phone').value.trim();
    const position = getActiveChip('f_position');
    const role = getActiveChip('f_role') || '회원';
    const duesVal = getActiveChip('f_dues') === 'paid';

    if(m){
      m.name = name; m.number = number?Number(number):null; m.phone = phone; m.position = position; m.role = role;
      m.dues = m.dues || {};
      m.dues[mk] = duesVal;
    }else{
      MEMBERS.push({
        id: uid('mem'), name, number: number?Number(number):null, phone, position, role,
        joinDate: new Date().toISOString().slice(0,10),
        dues: { [mk]: duesVal }
      });
    }
    await saveMembers();
    closeModal();
    renderAll();
    showToast(m?'회원 정보를 수정했습니다':'회원을 등록했습니다');
  });

  const delBtn = document.getElementById('btnDeleteMember');
  if(delBtn){
    delBtn.addEventListener('click', async ()=>{
      if(!confirm(`${m.name} 회원을 삭제할까요?`)) return;
      MEMBERS = MEMBERS.filter(x=>x.id!==m.id);
      await saveMembers();
      closeModal();
      renderAll();
      showToast('회원을 삭제했습니다');
    });
  }
}

function bindChipGroup(containerId){
  const c = document.getElementById(containerId);
  c.querySelectorAll('.chip').forEach(chip=>{
    chip.addEventListener('click', ()=>{
      c.querySelectorAll('.chip').forEach(x=>x.classList.remove('active'));
      chip.classList.add('active');
    });
  });
}
function getActiveChip(containerId){
  const el = document.querySelector('#'+containerId+' .chip.active');
  return el ? el.dataset.val : null;
}

/* ============================================================
   경기 관리
   ============================================================ */
function renderMatches(){
  const upcoming = MATCHES.filter(m=>m.status==='upcoming').sort((a,b)=> new Date(a.date+'T'+(a.time||'00:00')) - new Date(b.date+'T'+(b.time||'00:00')));
  const past = MATCHES.filter(m=>m.status==='done').sort((a,b)=> new Date(b.date)-new Date(a.date));

  const upBox = document.getElementById('upcomingMatches');
  upBox.innerHTML = upcoming.length ? upcoming.map(m=>matchCardHTML(m,true)).join('') : `<div class="empty" style="padding:24px 12px;"><p>예정된 경기가 없습니다.</p></div>`;
  bindMatchCardEvents(upBox);

  const pastBox = document.getElementById('pastMatches');
  pastBox.innerHTML = past.length ? past.map(m=>matchCardHTML(m,true)).join('') : `<div class="empty" style="padding:24px 12px;"><p>지난 경기 기록이 없습니다.</p></div>`;
  bindMatchCardEvents(pastBox);
}

function matchCardHTML(m, showActions){
  const dateObj = new Date(m.date + 'T' + (m.time||'00:00'));
  const dateStr = dateObj.toLocaleDateString('ko-KR', { month:'short', day:'numeric', weekday:'short' });
  const timeStr = m.time || '';
  const rsvpCounts = countRSVP(m);
  const isDone = m.status==='done';

  return `
  <div class="match-card" data-id="${m.id}">
    <div class="match-head">
      <span>${dateStr} ${timeStr}</span>
      <span class="match-status ${isDone?'done':'upcoming'}">${isDone?'종료':'예정'}</span>
    </div>
    <div class="match-body">
      <div class="match-vs">
        <span class="team-name">공사랑FC</span>
        ${isDone
          ? `<span class="score">${m.result?.scoreA ?? 0} : ${m.result?.scoreB ?? 0}</span>`
          : `<span class="team-name" style="color:var(--chalk-dim);">VS</span>`}
        <span class="team-name">${escapeHTML(m.opponent||'상대팀 미정')}</span>
      </div>
      <div class="match-meta">
        📍 ${escapeHTML(m.location||'장소 미정')}${m.cost ? ` · 대관비 ${Number(m.cost).toLocaleString()}원` : ''}<br>
        ${!isDone ? `✅ 참석 ${rsvpCounts.yes} · ❔ 미정 ${rsvpCounts.maybe} · ❌ 불참 ${rsvpCounts.no}` : (m.result?.mom ? `🏅 MOM: ${escapeHTML(memberName(m.result.mom))}` : '')}
      </div>
      ${showActions ? `
      <div class="match-actions">
        ${!isDone ? `<button class="btn btn-ghost btn-sm" data-act="rsvp">참석 체크</button>
                     <button class="btn btn-ghost btn-sm" data-act="teams">팀 편성</button>
                     <button class="btn btn-primary btn-sm" data-act="finish">결과 입력</button>` :
                     `<button class="btn btn-ghost btn-sm" data-act="editresult">결과 수정</button>`}
        <button class="btn btn-danger btn-sm" data-act="delete">삭제</button>
      </div>` : ''}
    </div>
  </div>`;
}

function countRSVP(m){
  const c = {yes:0, no:0, maybe:0};
  const rsvp = m.rsvp || {};
  MEMBERS.forEach(mem=>{
    const v = rsvp[mem.id];
    if(v==='yes') c.yes++; else if(v==='no') c.no++; else c.maybe++;
  });
  return c;
}
function memberName(id){ const m = memberById(id); return m ? m.name : '알 수 없음'; }

function bindMatchCardEvents(container){
  container.querySelectorAll('.match-card').forEach(card=>{
    const id = card.dataset.id;
    card.querySelectorAll('[data-act]').forEach(btn=>{
      btn.addEventListener('click', (e)=>{
        e.stopPropagation();
        const act = btn.dataset.act;
        const m = MATCHES.find(x=>x.id===id);
        if(act==='rsvp') openRSVPForm(m);
        if(act==='teams') openTeamForm(m);
        if(act==='finish' || act==='editresult') openResultForm(m);
        if(act==='delete') deleteMatch(m);
      });
    });
  });
}

async function deleteMatch(m){
  if(!confirm('이 경기를 삭제할까요?')) return;
  MATCHES = MATCHES.filter(x=>x.id!==m.id);
  await saveMatches();
  renderAll();
  showToast('경기를 삭제했습니다');
}

function openRSVPForm(m){
  const html = `
    <div class="modal-head"><h3>참석 체크</h3><button class="close-x" onclick="closeModal()">✕</button></div>
    <div class="match-meta" style="margin-bottom:8px;">${m.date} ${m.time} · ${escapeHTML(m.location||'')} vs ${escapeHTML(m.opponent||'')}</div>
    <div class="card rsvp-list" style="padding:4px 10px; max-height:50vh; overflow-y:auto;" id="rsvpList"></div>
    <div class="modal-foot">
      <button class="btn btn-primary btn-block" onclick="closeModal()">완료</button>
    </div>
  `;
  document.getElementById('modalBody').innerHTML = html;
  document.getElementById('overlay').classList.add('active');
  renderRSVPList(m);
}

function renderRSVPList(m){
  const box = document.getElementById('rsvpList');
  if(MEMBERS.length===0){ box.innerHTML = `<div class="empty"><p>등록된 회원이 없습니다.</p></div>`; return; }
  const sorted = [...MEMBERS].sort((a,b)=>(a.number||999)-(b.number||999));
  box.innerHTML = sorted.map(mem=>{
    const v = m.rsvp[mem.id] || 'maybe';
    return `
    <div class="member-row">
      <div class="jersey">${mem.number ?? '-'}</div>
      <div class="member-info"><div class="name">${escapeHTML(mem.name)}</div></div>
      <div class="rsvp-btns" data-mid="${mem.id}">
        <button class="rsvp-btn yes ${v==='yes'?'active':''}" data-v="yes">✓</button>
        <button class="rsvp-btn maybe ${v==='maybe'?'active':''}" data-v="maybe">?</button>
        <button class="rsvp-btn no ${v==='no'?'active':''}" data-v="no">✕</button>
      </div>
    </div>`;
  }).join('');

  box.querySelectorAll('.rsvp-btns').forEach(group=>{
    group.querySelectorAll('.rsvp-btn').forEach(btn=>{
      btn.addEventListener('click', async ()=>{
        const mid = group.dataset.mid;
        m.rsvp[mid] = btn.dataset.v;
        await saveMatches();
        group.querySelectorAll('.rsvp-btn').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
      });
    });
  });
}

function openTeamForm(m){
  const attending = MEMBERS.filter(mem => (m.rsvp[mem.id]||'maybe') === 'yes');

  `;

  function renderTeams(){
    const inA = new Set(m.teams.A);

    document.getElementById('countA').textContent = m.teams.A.length;
    document.getElementById('countB').textContent = m.teams.B.length;

    const rowHTML = (mem, zone) => `
      <div class="member-row" data-id="${mem.id}" style="padding:6px 4px;">
        <div class="jersey" style="width:28px;height:28px;font-size:11px;">${mem.number ?? '-'}</div>
        <div class="member-info"><div class="name" style="font-size:13px;">${escapeHTML(mem.name)}</div></div>

          ${zone!=='A'?`<button class="btn btn-ghost btn-sm" data-to="A">◀A</button>`:''}
          ${zone!=='B'?`<button class="btn btn-ghost btn-sm" data-to="B">B▶</button>`:''}
          ${zone!=='pool'?`<button class="btn btn-ghost btn-sm" data-to="pool">-</button>`:''}
        </div>
      </div>`;

    document.getElementById('teamAList').innerHTML = m.teams.A.length ? m.teams.A.map(id=>rowHTML(memberById(id),'A')).join('') : `<div style="font-size:11px;color:var(--chalk-dim);padding:8px;">비어있음</div>`;
    document.getElementById('teamBList').innerHTML = m.teams.B.length ? m.teams.B.map(id=>rowHTML(memberById(id),'B')).join('') : `<div style="font-size:11px;color:var(--chalk-dim);padding:8px;">비어있음</div>`;
    document.getElementById('teamPoolList').innerHTML = unassigned.length ? unassigned.map(mem=>rowHTML(mem,'pool')).join('') : `<div style="font-size:11px;color:var(--chalk-dim);padding:8px;">모두 배정됨</div>`;

    document.querySelectorAll('#teamAList [data-to], #teamBList [data-to], #teamPoolList [data-to]').forEach(btn=>{
      btn.addEventListener('click', (e)=>{
        const row = e.target.closest('.member-row');
        const id = row.dataset.id;
        m.teams.A = m.teams.A.filter(x=>x!==id);
        m.teams.B = m.teams.B.filter(x=>x!==id);
        if(btn.dataset.to==='A') m.teams.A.push(id);
        if(btn.dataset.to==='B') m.teams.B.push(id);
        renderTeams();
      });
    });
  }
  renderTeams();

  document.getElementById('btnAutoTeam').addEventListener('click', ()=>{
    const shuffled = [...pool].sort(()=>Math.random()-0.5);
    const half = Math.ceil(shuffled.length/2);
    m.teams.A = shuffled.slice(0,half).map(x=>x.id);
    m.teams.B = shuffled.slice(half).map(x=>x.id);
    renderTeams();
  });

  document.getElementById('btnSaveTeams').addEventListener('click', async ()=>{
    await saveMatches();
    closeModal();
    showToast('팀 편성을 저장했습니다');
  });
}

function openResultForm(m){
  if(!m.result) m.result = { scoreA:0, scoreB:0, scorers:[], mom:null };
  const attending = MEMBERS.filter(mem => (m.rsvp[mem.id]||'maybe') === 'yes');
  const pool = attending.length ? attending : MEMBERS;

  const html = `
    <div class="modal-head"><h3>경기 결과 입력</h3><button class="close-x" onclick="closeModal()">✕</button></div>
    <div class="match-meta" style="margin-bottom:10px;">공사랑FC vs ${escapeHTML(m.opponent||'상대팀')}</div>
    <div class="row2">
      <div><label>공사랑FC 득점</label><input type="number" id="f_scoreA" value="${m.result.scoreA}"></div>
      <div><label>${escapeHTML(m.opponent||'상대팀')} 득점</label><input type="number" id="f_scoreB" value="${m.result.scoreB}"></div>
    </div>

    <label>득점 / 도움 기록</label>
    <div class="card" id="scorerList" style="padding:6px 10px; max-height:32vh; overflow-y:auto;"></div>
    <button class="btn btn-ghost btn-sm" id="btnAddScorer" style="margin-top:8px;">+ 기록 추가</button>

    <label>오늘의 MOM</label>
    <select id="f_mom">
      <option value="">선택 안함</option>
      ${pool.map(mem=>`<option value="${mem.id}" ${m.result.mom===mem.id?'selected':''}>${escapeHTML(mem.name)}</option>`).join('')}
    </select>

    <div class="modal-foot">
      <button class="btn btn-ghost btn-block" onclick="closeModal()">취소</button>
      <button class="btn btn-primary btn-block" id="btnSaveResult">저장 및 종료</button>
    </div>
  `;
  document.getElementById('modalBody').innerHTML = html;
  document.getElementById('overlay').classList.add('active');

  function renderScorers(){
    const box = document.getElementById('scorerList');
    if(!m.result.scorers.length){
      box.innerHTML = `<div style="font-size:11.5px;color:var(--chalk-dim);padding:8px;">기록이 없습니다. + 버튼으로 추가하세요.</div>`;
      return;
    }
    box.innerHTML = m.result.scorers.map((s,i)=>`
      <div class="row2" style="margin-bottom:8px; align-items:center; grid-template-columns:2fr 1fr 1fr auto;">
        <select data-i="${i}" class="s-member">
          ${pool.map(mem=>`<option value="${mem.id}" ${s.memberId===mem.id?'selected':''}>${escapeHTML(mem.name)}</option>`).join('')}
        </select>
        <input type="number" data-i="${i}" class="s-goals" value="${s.goals||0}" placeholder="골" title="득점">
        <input type="number" data-i="${i}" class="s-assists" value="${s.assists||0}" placeholder="도움" title="도움">
        <button class="btn btn-danger btn-sm" data-i="${i}" data-del="1">✕</button>
      </div>
    `).join('');

    box.querySelectorAll('.s-member').forEach(el=> el.addEventListener('change', e=>{ m.result.scorers[e.target.dataset.i].memberId = e.target.value; }));
    box.querySelectorAll('.s-goals').forEach(el=> el.addEventListener('input', e=>{ m.result.scorers[e.target.dataset.i].goals = Number(e.target.value)||0; }));
    box.querySelectorAll('.s-assists').forEach(el=> el.addEventListener('input', e=>{ m.result.scorers[e.target.dataset.i].assists = Number(e.target.value)||0; }));
    box.querySelectorAll('[data-del]').forEach(el=> el.addEventListener('click', e=>{
      m.result.scorers.splice(Number(e.target.dataset.i),1);
      renderScorers();
    }));
  }
  renderScorers();

  document.getElementById('btnAddScorer').addEventListener('click', ()=>{
    if(pool.length===0){ showToast('참석 인원이 없습니다'); return; }
    m.result.scorers.push({ memberId: pool[0].id, goals:1, assists:0 });
    renderScorers();
  });

  document.getElementById('btnSaveResult').addEventListener('click', async ()=>{
    m.result.scoreA = Number(document.getElementById('f_scoreA').value)||0;
    m.result.scoreB = Number(document.getElementById('f_scoreB').value)||0;
    m.result.mom = document.getElementById('f_mom').value || null;
    m.status = 'done';
    await saveMatches();
    closeModal();
    renderAll();
    showToast('경기 결과를 저장했습니다');
  });
}

function computeStats(){
  const stats = {};
  MEMBERS.forEach(m=> stats[m.id] = { id:m.id, name:m.name, number:m.number, goals:0, assists:0, apps:0, mom:0 });
  MATCHES.filter(m=>m.status==='done').forEach(m=>{
    const attendedIds = new Set();
    (m.teams?.A||[]).forEach(id=>attendedIds.add(id));
    (m.teams?.B||[]).forEach(id=>attendedIds.add(id));
    if(attendedIds.size===0){
      Object.keys(m.rsvp||{}).forEach(id=>{ if(m.rsvp[id]==='yes') attendedIds.add(id); });
    }
    attendedIds.forEach(id=>{ if(stats[id]) stats[id].apps++; });
    (m.result?.scorers||[]).forEach(s=>{
      if(stats[s.memberId]){
        stats[s.memberId].goals += Number(s.goals)||0;
        stats[s.memberId].assists += Number(s.assists)||0;
      }
    });
    if(m.result?.mom && stats[m.result.mom]) stats[m.result.mom].mom++;
  });
  return Object.values(stats);
}

function renderLeaderboard(){
  const stats = computeStats().sort((a,b)=> b[lbMode]-a[lbMode] || a.name.localeCompare(b.name));
  const box = document.getElementById('leaderboard');
  const labelMap = {goals:'골', assists:'도움', apps:'출석', mom:'MOM'};
  const filtered = stats.filter(s=> s[lbMode] > 0);
  const showList = filtered.length ? filtered : stats.slice(0,0);

  if(MEMBERS.length===0){
    box.innerHTML = `<div class="empty"><p>회원을 먼저 등록해주세요.</p></div>`;
    return;
  }
  if(showList.length===0){
    box.innerHTML = `<div class="empty"><p>아직 기록된 ${labelMap[lbMode]} 데이터가 없습니다.<br>경기 결과를 입력하면 랭킹이 표시됩니다.</p></div>`;
    return;
  }
  box.innerHTML = showList.slice(0,20).map((s,i)=>`
    <div class="lb-row">
      <div class="lb-rank">${i+1}</div>
      <div class="jersey" style="width:30px;height:30px;font-size:12px;">${s.number ?? '-'}</div>
      <div class="lb-name">${escapeHTML(s.name)}</div>
      <div class="lb-val">${s[lbMode]}</div>
    </div>
  `).join('');
}

function renderDuesSettlement(){
  const years = availableYears();
  if(!years.includes(duesSettleYear)) duesSettleYear = years[years.length-1];

  const ySel = document.getElementById('duesYearSelect');
  ySel.innerHTML = `
    <button id="duesYearPrev" ${years.indexOf(duesSettleYear)<=0?'disabled style="opacity:.3;"':''}>‹</button>
    <span class="y">${duesSettleYear}</span>
    <button id="duesYearNext" ${years.indexOf(duesSettleYear)>=years.length-1?'disabled style="opacity:.3;"':''}>›</button>
  `;
  const prevBtn = document.getElementById('duesYearPrev');
  const nextBtn = document.getElementById('duesYearNext');
  if(prevBtn) prevBtn.addEventListener('click', ()=>{ const i=years.indexOf(duesSettleYear); if(i>0){ duesSettleYear=years[i-1]; renderDuesSettlement(); } });
  if(nextBtn) nextBtn.addEventListener('click', ()=>{ const i=years.indexOf(duesSettleYear); if(i<years.length-1){ duesSettleYear=years[i+1]; renderDuesSettlement(); } });

  const rows = [];
  for(let mo=1; mo<=12; mo++) rows.push(monthSettlement(duesSettleYear, mo));
  const yearIncome = rows.reduce((s,r)=>s+r.income,0);
  const yearExpense = rows.reduce((s,r)=>s+r.expense,0);

  document.getElementById('duesSummaryGrid').innerHTML = `
    <div class="stat-box"><div class="n" style="font-size:16px;">${yearIncome.toLocaleString()}</div><div class="l">연간 수입(원)</div></div>
    <div class="stat-box"><div class="n" style="font-size:16px;">${yearExpense.toLocaleString()}</div><div class="l">연간 지출(원)</div></div>
    <div class="stat-box"><div class="n" style="font-size:16px; color:${(yearIncome-yearExpense)>=0?'var(--chalk)':'#FF9B92'};">${(yearIncome-yearExpense).toLocaleString()}</div><div class="l">순잔액(원)</div></div>
  `;

  document.getElementById('duesLedger').innerHTML = rows.map(r=>`
    <div class="ledger-row">
      <span class="ledger-mo">${r.month}월</span>
      <span class="ledger-val pos">+${r.income.toLocaleString()}</span>
      <span class="ledger-val neg">${r.expense>0?'-':''}${r.expense.toLocaleString()}</span>
      <span class="ledger-val" style="color:${r.balance>=0?'var(--chalk)':'#FF9B92'};">${r.balance.toLocaleString()}</span>
    </div>
  `).join('');
}

function escapeHTML(str){
  if(str===null||str===undefined) return '';
  return String(str).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
